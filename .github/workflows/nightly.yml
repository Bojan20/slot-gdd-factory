# slot-gdd-factory — Nightly heavy probe sweep
#
# Runs the "ultimate-*" probes that would burn 10–20 min per PR if they
# were on the hot path. Cron: 03:00 UTC = 04:00 CET = before Boki wakes,
# so failures land in the morning as a single notification.
#
# Also reachable via `workflow_dispatch` from the GitHub UI for ad-hoc.

name: nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  heavy-probes:
    name: ultimate-* probes
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # `fail-fast: false` — we want to see all failures in one pass, not
      # stop at the first red probe. Boki triages from the matrix view.
      fail-fast: false
      matrix:
        probe:
          - test:bundle
          - test:bundle:compress
          - test:i18n:sweep
          - test:load
          - test:long-run
          - test:rng:validator
          - test:touch:validator
          - test:tti:validator
          - test:wp:cross:validator
          - test:overflow
          - test:sharpness
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # UQ-U-2 atom #12 (Boki 2026-06-25): unify Node version across
          # all 3 workflows (ci/pdf-baseline/nightly all on 22). Drift
          # between Node 20 and 22 means a CI-green PR can ship a nightly
          # red caused only by stdlib timing/import behavior diffs.
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run nightly probe
        # UQ-U-2 atom #13 (Boki 2026-06-25): probe name MUST go through
        # an env var, never directly interpolated into `run:`. GitHub
        # Actions runs `run:` through bash; ${{ matrix.probe }} would
        # be substituted BEFORE bash sees the line, so if matrix.probe
        # were ever sourced from external input (PR title, label, ...)
        # it would be a shell-injection foothold. Even with hard-coded
        # matrix today, this is the canonical preempt fix. See:
        # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
        env:
          PROBE: ${{ matrix.probe }}
        run: npm run "$PROBE"
        continue-on-error: false

  cross-browser:
    name: Playwright cross-browser (chromium · firefox · webkit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # UQ-U-2 atom #12: same unification (Node 22 across the board).
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: test:cross-browser
        run: npm run test:cross-browser
