# slot-gdd-factory — CI / pre-merge gate
#
# N+2 atom H (MASTER_TODO) — CI/CD pipeline for every push & PR.
#
# What this gate guarantees on `main`:
#   1. `npm ci`                  — lockfile-honest install on Linux (cleanest baseline)
#   2. `npm run test:runtime`    — orchestrator runtime probes (gridRenderer, devForceButtons,
#                                   globals contract) — 8 tests, no external deps
#
# Why this minimal scope (honestly: verify:quick is NOT CI-safe today):
#   `verify:quick` is Boki's local pre-commit orchestrator. It assumes:
#     - `~/Desktop/GDD/` PDF corpus is present (STRESS-TEST-INGEST step)
#     - sister repo `slot-math-engine-template` is checked out next door
#       (math-backend health check; LV3 batch/spin offline otherwise)
#     - Chromium is installed + baked block-coverage walker baseline is
#       on-disk under an absolute `/Users/vanvinklstudio/...` path
#       (UQ-MASTERY block liveness audit)
#     - V9 visual QA wire writes to `dist/ingest/v9-wire-contract-*`
#       which the CI run can't reproduce in 50 s
#   None of those hold on a stateless GitHub-hosted Ubuntu runner; trying
#   to run verify:quick on CI produces a red wall day-one (verified
#   empirically — first CI run failed on these exact deps). Putting it
#   here would defeat the gate. The honest path: keep verify:quick as
#   the local pre-commit surface, and run only CI-safe contract probes
#   on the remote runner until a `verify:ci` profile is built that skips
#   filesystem + sister-repo + chromium gates.
#
# Why `test:blocks` is intentionally NOT in this gate:
#   The block contract suite is Boki's local pre-commit surface. It also
#   contains the audio block tests which are LOCKED for this repo until
#   the audio unlock signal lands; CI gate would have to depend on a
#   maintainer keeping the audio test in sync without being allowed to
#   touch it.
#
# Why `test:lego` is intentionally NOT in this gate (for now):
#   The LEGO invariant walker has a pre-existing 7/8 failure on `main`
#   (HOOK_EVENTS missing onGddMetaReady / onSymbolModifiersApplied /
#   onCascadeHalted registrations). Adding it before that regression is
#   closed would land CI permanently red on day one. Enable this step in
#   a follow-up PR after the HOOK_EVENTS gap is sealed.
#
# Roadmap (when the next CI-extension PR lands):
#   - Add `npm run verify:ci` script that runs verify.mjs with a `--ci`
#     flag skipping STRESS-TEST-INGEST, math-backend health, block-coverage
#     walker, V9 ingest wire (all the local-fs-bound steps).
#   - Add `npm run test:blocks:no-audio` once audio unlock signal lands.
#   - Add `npm run test:lego` after HOOK_EVENTS registrations land.
#
# Node version pin: 20 (LTS as of 2026-Q1) — local Node 25 is fine but CI
# pins to LTS so a 25→26 breaking change can't kill main without warning.
#
# Concurrency group: PRs supersede their own previous run; main pushes
# always finish.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  # F5-c (Boki 2026-06-27) — verify summary auto-posts to PR threads.
  # `pull-requests: write` lets the workflow create / update one
  # comment per PR (marker-keyed so subsequent runs replace, never
  # stack).
  pull-requests: write

jobs:
  gate:
    name: install + test:runtime
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # UQ-U-3 atom #10 (security agent #3): fetch-depth REDUCED from
          # 0 (full history) → 1 (single commit) for pull_request events.
          # Anti-vendor lint reads commit author from THE CURRENT HEAD only;
          # it does NOT need to walk history. Full history on PRs exposed
          # the entire historical commit set in CI logs to fork-PR authors —
          # if any commit ever leaked a secret, that history was reachable.
          # Push-to-main events still get full history because the anti-
          # vendor lint occasionally cross-references the last N commits.
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}

      - name: Setup Node 22 (current GitHub-hosted Ubuntu default)
        uses: actions/setup-node@v4
        with:
          # GitHub Actions deprecated Node 20 runners 2025-09. Bumped to
          # 22 LTS so deprecation notice doesn't sit on every run.
          node-version: '22'
          cache: 'npm'

      - name: Install deps (npm ci)
        run: npm ci

      # UQ-U-8 P1 (Boki 2026-06-25, observability U-8-C #11+12) — on
      # any failed gate, upload the reports/ directory + write a
      # GITHUB_STEP_SUMMARY block listing which step failed. Previously
      # a red ci.yml gave the reviewer raw scrollback only; with these,
      # the PR conversation surfaces a clean summary + a downloadable
      # artifact for postmortem (reports/ holds verify --json output,
      # baseline diffs, V9 vision telemetry, etc).
      #
      # UQ-U-2 atom #14 (Boki 2026-06-25): actionlint as a first-class
      # CI step. Catches YAML/syntax/shellcheck issues in workflows
      # BEFORE the rest of the gate runs (so a mistyped matrix value
      # or unquoted shell var in `run:` fails fast).
      #
      # UQ-U-3 atom #9 (security agent #1): SHA-pin third-party
      # `reviewdog/action-actionlint` — tag `@v1` is mutable, a future
      # malicious release tag mutation could land arbitrary code in CI.
      # Pinned to commit dereferenced from `v1` tag on 2026-06-25.
      # To refresh:
      #   TAG_OBJ=$(gh api repos/reviewdog/action-actionlint/git/refs/tags/v1 --jq .object.sha)
      #   gh api repos/reviewdog/action-actionlint/git/tags/$TAG_OBJ --jq .object.sha
      # then update the SHA below + bump the comment date.
      #
      # SHA-pin scope decision (still acknowledged): actions/checkout@v4 +
      # actions/setup-node@v4 stay at tag because they're first-party
      # GitHub-maintained with quarterly rotation already in their release
      # discipline. Third-party action SHA-pin is the higher-risk surface.
      - name: Lint workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1 @ 2026-06-25
        with:
          # reviewdog 2025 rename: fail_on_error → fail_level (string,
          # one of: none/any/info/warning/error). 'error' = fail on real
          # errors (same as old fail_on_error: true).
          fail_level: error

      - name: Runtime probes
        run: npm run test:runtime

      # UQ-U-9 P1 (Boki 2026-06-25, performance U-8-B #2/#4 deferred):
      # batched contract-suite runner. Replaces 7 separate `npm run
      # test:*` spawns with ONE Node process that imports each suite
      # via dynamic `import()`. 7 × ~80-120ms cold-start (≈ 700-900ms
      # overhead) collapses to ~80ms total. Measured local 1.55s →
      # 0.40s (74% wallclock reduction). Same coverage, same failure
      # surfacing — each suite still owns its own t(name,fn) + tally;
      # the runner aggregates exit codes and reports per-suite duration.
      #
      # Covers ALL 7 prior contract suites in one step:
      #   - model-schema (18 cases)
      #   - vision-guard (20 cases)
      #   - deep-freeze (21 cases)
      #   - ixf-coverage (7 cases)
      #   - rust-executor
      #   - kernel-init
      #   - rect-transform
      - name: All contract suites (batched runner)
        run: npm run test:contracts

      # UQ-U-6 P2 #3 (Boki 2026-06-25) — IXF deep walker as a hard
      # gate. The smoke (above) covers a handful of anchor hooks; the
      # deep walker parses the full doc table and asserts every S01..S15
      # row resolves to ≥ 1 hook actually present in HOOK_EVENTS, AND
      # that no hook listed in the doc is missing from the registry.
      # Sub-100ms, pure-Node — same cost class as the smoke. Catches
      # the "doc edited but block author forgot to register the event"
      # regression class that the smoke alone misses.
      - name: IXF deep coverage walker (drift gate)
        run: npm run audit:ixf

      # F5-a (Boki 2026-06-27) — CI-safe verify profile. `verify:ci`
      # invokes tools/verify.mjs with --ci --quick: runs the full ~70-
      # step verify orchestrator BUT skips the local-fs / sister-repo /
      # chromium-dependent steps that can't reproduce on a stateless
      # Ubuntu runner.
      #
      # Skipped under --ci (8 steps):
      #   B / B+ / B++ / B+++ / B+++++  — sister-repo Python kernel
      #     bridges. Sister checkout is not present on the runner.
      #   V9 INGEST WIRE                — needs dist/ingest/<slug>/
      #     artefacts that the CI install can't reproduce in time.
      #   STRESS-TEST-INGEST            — walks ~/Desktop/GDD/ corpus.
      #   UQ-MASTERY block liveness     — baked walker baseline lives at
      #     an absolute local path; Chromium dep.
      #
      # The remaining steps cover: archetype catalog, parser, scaffolding,
      # ingest tool, UQ-FORTIFY*, semantic verifier, UQ-CASH/COVER/TRAIN,
      # V8/V9 contract suites (in-tree fixtures), MATH compliance walker,
      # MATH-PRECISION calibrator, kernel registry, anti-vendor lint,
      # web dashboard, GDD one-pager, and the batched 7-suite contract
      # runner. ~60 steps run; ~8 skip. Failure surface for everything
      # CI-reproducible stays full-fat.
      # F5-c (Boki 2026-06-27) — capture verify JSON for downstream
      # summary + PR comment. `verify:ci --json` writes the structured
      # results to a tempfile so a non-zero exit doesn't lose the
      # report. The bash trap pattern keeps both exit code AND output
      # so the workflow still fails appropriately.
      - name: Verify gate (CI-safe profile) + capture JSON
        id: verify
        run: |
          set +e
          node tools/verify.mjs --ci --quick --json > /tmp/verify.json
          VERIFY_EXIT=$?
          # Always emit a quick line so the step's stdout isn't bare.
          jq -r '.overall' /tmp/verify.json || echo "(verify report unparseable)"
          exit $VERIFY_EXIT

      # F5-c — generate step summary from verify JSON. Always emits,
      # success OR fail, so reviewers see the full step ladder in the
      # GitHub Actions UI's Summary tab.
      - name: Emit verify summary (always)
        if: always()
        run: |
          if [ -f /tmp/verify.json ]; then
            node tools/_verify-pr-summary.mjs --in /tmp/verify.json --compact >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠ verify output missing" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Verify step crashed before writing /tmp/verify.json." >> "$GITHUB_STEP_SUMMARY"
          fi

      # F5-c — post verify summary as a PR comment on every PR event.
      # Uses the GitHub CLI (pre-installed on ubuntu-latest runners) +
      # the workflow's GITHUB_TOKEN. Required permission `pull-requests:
      # write` is granted in the top-level `permissions` block.
      #
      # The comment is identified by a hidden marker so subsequent runs
      # UPDATE the existing comment instead of stacking new ones.
      - name: Post verify summary as PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f /tmp/verify.json ]; then
            echo "no verify json — skipping PR comment"
            exit 0
          fi
          MARKER='<!-- verify-pr-summary-marker -->'
          {
            echo "$MARKER"
            node tools/_verify-pr-summary.mjs --in /tmp/verify.json --compact
          } > /tmp/verify-comment.md

          # Find existing comment with marker, update or create.
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n 1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$EXISTING" \
              -X PATCH -f body="$(cat /tmp/verify-comment.md)"
            echo "updated comment $EXISTING"
          else
            gh pr comment "$PR_NUM" --body-file /tmp/verify-comment.md
            echo "posted new comment"
          fi

      # Legacy failure summary kept for explicit "what just blew up" line.
      - name: Emit failure summary
        if: failure()
        run: |
          {
            echo "## ❌ ci gate failed"
            echo ""
            echo "| field | value |"
            echo "|:--|:--|"
            echo "| commit | \`${{ github.sha }}\` |"
            echo "| event  | ${{ github.event_name }} |"
            echo "| ref    | ${{ github.ref }} |"
            echo ""
            echo "See verify summary above (full step ladder) + reports/ artifact for traces."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-${{ github.sha }}
          path: reports/
          if-no-files-found: ignore
          retention-days: 14
