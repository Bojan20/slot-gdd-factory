<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Block Manifest · slot-gdd-factory (200 blocks)</title>
<style>
  :root { color-scheme: dark; --bg:#11141a; --fg:#e6e9ef; --muted:#8b94a6; --accent:#7fbfff; --accent-dark:#205080; --card:#1a1f29; --border:#262d3a; }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 0; }
  header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 1.4rem; font-weight: 800; letter-spacing: 0.04em; }
  header .count { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 0.85rem; }
  header .filter { flex: 1; min-width: 200px; }
  header .filter input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: #0c0f15; color: var(--fg); font-size: 0.95rem; }
  header .filter input:focus { outline: 2px solid var(--accent); }
  main { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 70px); }
  nav { border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; max-height: calc(100vh - 70px); }
  nav .cat { padding: 8px 16px 4px; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
  nav button.entry { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 7px 16px; background: transparent; border: none; color: var(--fg); text-align: left; cursor: pointer; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.85rem; transition: background .12s ease; }
  nav button.entry:hover, nav button.entry:focus-visible { background: rgba(127,191,255,.08); outline: none; }
  nav button.entry[aria-current="true"] { background: linear-gradient(90deg, var(--accent-dark), transparent); color: var(--accent); }
  nav button.entry .loc { font-size: 0.7rem; color: var(--muted); }
  section.detail { padding: 24px 28px; overflow-y: auto; max-height: calc(100vh - 70px); }
  section.detail h2 { margin-top: 0; font-size: 1.6rem; font-weight: 900; letter-spacing: 0.02em; }
  section.detail .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  section.detail .meta .chip { background: var(--card); border: 1px solid var(--border); padding: 4px 10px; border-radius: 8px; font-size: 0.78rem; }
  section.detail h3 { margin-top: 24px; font-size: 1rem; font-weight: 800; letter-spacing: 0.06em; color: var(--accent); text-transform: uppercase; }
  section.detail pre { background: #0c0f15; border: 1px solid var(--border); padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 0.82rem; }
  section.detail p { line-height: 1.6; color: #c5cbd6; max-width: 75ch; }
  section.detail ul { padding-left: 18px; }
  section.detail li { line-height: 1.6; }
  section.detail code { background: #0c0f15; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
  .empty { color: var(--muted); font-style: italic; }
  @media (max-width: 800px) { main { grid-template-columns: 1fr; } nav { max-height: 280px; } section.detail { max-height: none; } }
</style>
</head>
<body>
<header>
  <h1>Block Manifest</h1>
  <span class="count">200 blocks</span>
  <div class="filter"><input id="filter" type="search" placeholder="Search blocks by name, category, or event..." aria-label="Search blocks"></div>
</header>
<main>
  <nav id="nav" aria-label="Block navigation"></nav>
  <section class="detail" id="detail" aria-live="polite"></section>
</main>
<script>
const BLOCKS = [{"name":"achievementToast","category":"uncategorised","description":"Wave LEGO-PROG (DEF1 · 3/3) — Level-up + achievement toast popups.","file":"src/blocks/achievementToast.mjs","testFile":"tests/blocks/achievementToast.test.mjs","loc":303,"exports":["defaultConfig","emitAchievementToastCSS","emitAchievementToastMarkup","emitAchievementToastRuntime","resolveConfig"],"emittedEvents":["onAchievementToastDismissed","onAchievementToastShown"],"lifecycleHooks":["onAchievementUnlocked","onPlayerLevelUp"],"purpose":"When `playerXp.mjs` emits `onPlayerLevelUp` or when another block\n  (or operator) emits a generic achievement event, this block paints\n  a celebratory toast in top-center with badge label + reward\n  description + dismiss timer. Stack-aware — if multiple toasts\n  arrive fast, they queue gracefully instead of overlapping.\n\nIndustry-reference (vendor-neutral):\n  Achievement toasts are an emerging 2024-2026 polish layer.\n  Industry baseline: top-center floating card, 3-5s visible, badge\n  icon + title + sub, optional confetti, click-through allowed. WCAG\n  role=alert + aria-live=assertive for the open moment.","industryRef":"Achievement toasts are an emerging 2024-2026 polish layer.\n  Industry baseline: top-center floating card, 3-5s visible, badge\n  icon + title + sub, optional confetti, click-through allowed. WCAG\n  role=alert + aria-live=assertive for the open moment.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitAchievementToastCSS(cfg)","desc":"CSS string"},{"name":"emitAchievementToastMarkup(cfg)","desc":"HTML string"},{"name":"emitAchievementToastRuntime(cfg)","desc":"runtime JS string"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onPlayerLevelUp        — auto-toast Level N badge","desc":""},{"name":"onAchievementUnlocked  — explicit operator-pushed achievement","desc":""},{"name":"emits:       onAchievementToastShown   { kind, label }","desc":""},{"name":"onAchievementToastDismissed { kind, label, reason }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• role=\"alert\" + aria-live=\"assertive\" + aria-atomic=\"true\"","desc":""},{"name":"• Dismissable via Esc OR click on toast OR auto-timer","desc":""},{"name":"• prefers-reduced-motion: instant fade","desc":""},{"name":"• Queue: max 3 concurrent toasts, oldest auto-dismiss","desc":""},{"name":"• Tokens hoisted (0 magic numbers)","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["onPlayerLevelUp        — auto-toast Level N badge","onAchievementUnlocked  — explicit operator-pushed achievement"],"emits":["onAchievementToastShown   { kind, label }","onAchievementToastDismissed { kind, label, reason }","a11y / perf:","• role=\"alert\" + aria-live=\"assertive\" + aria-atomic=\"true\"","• Dismissable via Esc OR click on toast OR auto-timer","• prefers-reduced-motion: instant fade","• Queue: max 3 concurrent toasts, oldest auto-dismiss","• Tokens hoisted (0 magic numbers)","/"]}},{"name":"allWaysEval","category":"evaluator","description":"Universal \"all-ways\" win evaluator: counts a winning combination","file":"src/blocks/allWaysEval.mjs","testFile":"tests/blocks/allWaysEval.test.mjs","loc":718,"exports":["defaultConfig","emitAllWaysEvalCSS","emitAllWaysEvalMarkup","emitAllWaysEvalRuntime","evaluateAllWays","findConsecutiveRuns","resolveConfig"],"emittedEvents":["onAllWaysCleared","onAllWaysPay"],"lifecycleHooks":["onFsEnd","onSpinResult","preSpin"],"purpose":"───────\n  Universal \"all-ways\" win evaluator: counts a winning combination\n  whenever a symbol appears on ANY 3+ consecutive adjacent reels — be\n  that left-to-right (LTR), right-to-left (RTL), or both simultaneously.\n  Distinct from:\n    • waysEval            (LTR-only consecutive ways)\n    • payAnywhereEval     (count anywhere on the grid, ignores adjacency)\n    • clusterPaysEval     (orthogonally connected blob, ignores paytable, minRunLength, wildId)   (pure helper)\n  findConsecutiveRuns(symbolPositions, reelCount)         (pure helper)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onSpinResult (priority 80) — evaluates grid, emits all-ways pays\n    • preSpin      (priority 80) — clears prior pay-path overlay + state\n    • onFsEnd      (priority 80) — resets accumulators between rounds\n  emits:\n    • onAllWaysPay     { wins: WinEvent[], totalPayX: number }\n    • onAllWaysCleared { }\n\n  HW guard: when window.HW_STATE && HW_STATE.active === true the\n  onSpinResult callback returns early. Hold-and-Win rounds own their\n  own evaluator and the all-ways evaluator must not double-pay.","publicApi":[],"lifecycle":{"subscribes":["• onSpinResult (priority 80) — evaluates grid, emits all-ways pays","• preSpin      (priority 80) — clears prior pay-path overlay + state","• onFsEnd      (priority 80) — resets accumulators between rounds"],"emits":["• onAllWaysPay     { wins: WinEvent[], totalPayX: number }","• onAllWaysCleared { }","HW guard: when window.HW_STATE && HW_STATE.active === true the","onSpinResult callback returns early. Hold-and-Win rounds own their","own evaluator and the all-ways evaluator must not double-pay."]}},{"name":"ambientBackgroundWheel","category":"uncategorised","description":"Modern slot themes layer a slowly-rotating cosmetic background element","file":"src/blocks/ambientBackgroundWheel.mjs","testFile":"tests/blocks/ambientBackgroundWheel.test.mjs","loc":225,"exports":["defaultConfig","emitAmbientBackgroundWheelCSS","emitAmbientBackgroundWheelMarkup","emitAmbientBackgroundWheelRuntime","resolveConfig"],"emittedEvents":["onAmbientPhase"],"lifecycleHooks":["onBigWinTierEntered","onFsTrigger","postSpin","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitAmbientBackgroundWheelCSS(cfg)","desc":""},{"name":"emitAmbientBackgroundWheelMarkup(cfg)","desc":""},{"name":"emitAmbientBackgroundWheelRuntime(cfg)","desc":""}],"lifecycle":{"subscribes":["preSpin                → set phase 'spinning' (speed up)","postSpin               → set phase 'idle'    (slow down)","onBigWinTierEntered    → set phase 'win'     (pulse-out 1.5 s)","onFsTrigger            → set phase 'win'     (pulse + FS entry feel)"],"emits":["onAmbientPhase { phase, speedMul, source }","a11y:","- aria-hidden=\"true\" on the host (pure decoration; no AT exposure).","- prefers-reduced-motion gate (animation disabled).","Vendor-neutral. No game / studio strings.","@module ambientBackgroundWheel","/"]}},{"name":"ambientBgVariants","category":"uncategorised","description":"Wave LEGO-THEME (B-8 · 3/3) — Mood-driven ambient background variants.","file":"src/blocks/ambientBgVariants.mjs","testFile":"tests/blocks/ambientBgVariants.test.mjs","loc":180,"exports":["defaultConfig","emitAmbientBgVariantsCSS","emitAmbientBgVariantsMarkup","emitAmbientBgVariantsRuntime","resolveConfig"],"emittedEvents":["onAmbientMoodChanged"],"lifecycleHooks":["onBigWinTierEnter","onBigWinTierExit","onFsEnd","onFsTrigger","onSpinResult","onThemeChanged"],"purpose":"Listens to win/loss signals and switches the body background to a\n  mood-appropriate variant: calm (idle / losing) → tense (small win) →\n  celebration (big win) → bonus (FS in progress). Each variant is a\n  CSS class applied to `<body>`; designer customizes via a stylesheet.\n\n  This is the \"feels\" layer that makes the table breathe. Sister\n  blocks (themePicker, paletteRoulette) own visual identity; this\n  block owns visual MOOD.\n\nIndustry-reference (vendor-neutral):\n  Mood-driven backgrounds are an emerging 2024-2026 polish layer.\n  Industry baseline: 3-5 mood states (calm, tense, celebration,\n  bonus), CSS-driven (no JS-thrashed gradients), graceful transitions\n  that honor prefers-reduced-motion.","industryRef":"Mood-driven backgrounds are an emerging 2024-2026 polish layer.\n  Industry baseline: 3-5 mood states (calm, tense, celebration,\n  bonus), CSS-driven (no JS-thrashed gradients), graceful transitions\n  that honor prefers-reduced-motion.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitAmbientBgVariantsCSS(cfg)","desc":"CSS string"},{"name":"emitAmbientBgVariantsMarkup(cfg)","desc":"HTML string (no surface; just live region)"},{"name":"emitAmbientBgVariantsRuntime(cfg)","desc":"runtime JS string"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onSpinResult — pick mood from win value","desc":""},{"name":"onBigWinTierEnter — celebration mood","desc":""},{"name":"onBigWinTierExit  — calm down","desc":""},{"name":"onFsTrigger — bonus mood","desc":""},{"name":"onFsEnd     — calm","desc":""},{"name":"onThemeChanged — re-apply mood class","desc":""},{"name":"emits:       onAmbientMoodChanged { mood, prevMood }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• Mood is body class toggle — no DOM thrash, GPU-friendly.","desc":""},{"name":"• prefers-reduced-motion","desc":"instant transition (no gradient animations)."},{"name":"• Tokens hoisted.","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["onSpinResult — pick mood from win value","onBigWinTierEnter — celebration mood","onBigWinTierExit  — calm down","onFsTrigger — bonus mood","onFsEnd     — calm","onThemeChanged — re-apply mood class"],"emits":["onAmbientMoodChanged { mood, prevMood }","a11y / perf:","• Mood is body class toggle — no DOM thrash, GPU-friendly.","• prefers-reduced-motion → instant transition (no gradient animations).","• Tokens hoisted.","/"]}},{"name":"anteBet","category":"feature","description":"When GDD declares an `ante_bet` feature, this block emits an opt-in","file":"src/blocks/anteBet.mjs","testFile":"tests/blocks/anteBet.test.mjs","loc":271,"exports":["defaultConfig","emitAnteBetCSS","emitAnteBetMarkup","emitAnteBetRuntime","resolveConfig"],"emittedEvents":["onAnteBetChanged"],"lifecycleHooks":[],"purpose":"When GDD declares an `ante_bet` feature, this block emits an opt-in\n  footer toggle (default `enabled: false`) that raises the cost-per-spin by a configured multiplier\n  (industry baseline 1.25× = +25 %) and, in exchange, doubles the\n  scatter/trigger probability. The toggle's runtime state is exposed on\n  `window.ANTE_BET_ON` for any downstream math layer to consume. The\n  visual + flag layer is complete here; real bet deduction lands with the\n  PAR hot-swap injector in Phase 2.\n\nIndustry-reference (vendor-neutral):\n  \"Ante bet\" / \"raise the stakes\" is a regulator-friendly cross-vendor\n  pattern: a single boolean knob that multiplies the wager and doubles\n  the trigger weight, leaving RTP unchanged when math is recomputed\n  correctly. The 1.25× baseline is the modal value across the industry.","industryRef":"\"Ante bet\" / \"raise the stakes\" is a regulator-friendly cross-vendor\n  pattern: a single boolean knob that multiplies the wager and doubles\n  the trigger weight, leaving RTP unchanged when math is recomputed\n  correctly. The 1.25× baseline is the modal value across the industry.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitAnteBetCSS(cfg)","desc":"CSS string (toggle pill styles)"},{"name":"emitAnteBetMarkup(cfg)","desc":"HTML string (toggle pill)"},{"name":"emitAnteBetRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  — (none — purely user-input driven)","desc":""},{"name":"emits:       onAnteBetChanged { on, costMult, triggerMult }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• Toggle exposes role=\"switch\" + aria-checked + keyboard activation.","desc":""},{"name":"• CSS is gated by `cfg.enabled` (returns '' when disabled) so the","desc":""},{"name":"disabled block has zero paint cost.","desc":""},{"name":"• All durations / sizes hoisted into `ANTE_BET_TOKENS` (0 magic","desc":""},{"name":"numbers); honors prefers-reduced-motion via shared theme tokens.","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["— (none — purely user-input driven)"],"emits":["onAnteBetChanged { on, costMult, triggerMult }","a11y / perf:","• Toggle exposes role=\"switch\" + aria-checked + keyboard activation.","• CSS is gated by `cfg.enabled` (returns '' when disabled) so the","disabled block has zero paint cost.","• All durations / sizes hoisted into `ANTE_BET_TOKENS` (0 magic","numbers); honors prefers-reduced-motion via shared theme tokens.","/"]}},{"name":"anteBetLadder","category":"feature","description":"Wave LEGO-BUY (4 / 8) — Multi-tier ante bet ladder (stake escalator).","file":"src/blocks/anteBetLadder.mjs","testFile":"tests/blocks/anteBetLadder.test.mjs","loc":384,"exports":["defaultConfig","emitAnteBetLadderCSS","emitAnteBetLadderMarkup","emitAnteBetLadderRuntime","resolveConfig"],"emittedEvents":["onAnteBetLadderChanged"],"lifecycleHooks":["onFsEnd","onFsTrigger"],"purpose":"When GDD declares `ante_bet_ladder` (or `ante_bet.tiers[]`), this block\n  replaces the single boolean `anteBet` toggle with a 2–4 step ladder\n  (e.g. OFF / +25% / +50% / +100%). Each rung carries its own\n  `costMultiplier` and `triggerMultiplier` so the math layer can pull\n  the matching scatter weight from the PAR. Industry reference for\n  tiered stake escalators is the \"spice up the bet\" family of features\n  that segment recreational and bonus-hunter players with the same\n  feature surface.\n\n  Mutually exclusive with `anteBet.mjs` — orchestrator prefers the\n  ladder when both resolve enabled. Single-tier degeneracy falls back\n  to anteBet (we self-disable when tier count < 2 effective levels).\n\nIndustry-reference (vendor-neutral):\n  Tiered ante bets are an emerging post-2024 industry pattern. Most\n  shipped ladders use 3 rungs: OFF (1.0×), MID (~1.5×), MAX (2.0×).\n  Some ship 4 with an entry-level +25% rung. The trigger-probability\n  multiplier grows roughly linearly with bet (with PAR-side RTP\n  normalization). The block models the visual + control surface only;\n  real math binding lands with PAR hot-swap (Phase 2).","industryRef":"Tiered ante bets are an emerging post-2024 industry pattern. Most\n  shipped ladders use 3 rungs: OFF (1.0×), MID (~1.5×), MAX (2.0×).\n  Some ship 4 with an entry-level +25% rung. The trigger-probability\n  multiplier grows roughly linearly with bet (with PAR-side RTP\n  normalization). The block models the visual + control surface only;\n  real math binding lands with PAR hot-swap (Phase 2).","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults (4 sample rungs)"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitAnteBetLadderCSS(cfg)","desc":"CSS string (segmented rail styles)"},{"name":"emitAnteBetLadderMarkup(cfg)","desc":"HTML string (segmented rail)"},{"name":"emitAnteBetLadderRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onFsTrigger (lock rail while in bonus)","desc":""},{"name":"onFsEnd     (unlock on bonus end)","desc":""},{"name":"emits:       onAnteBetLadderChanged { rungId, costMult, triggerMult }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• role=\"radiogroup\" with role=\"radio\" rungs (industry pattern for","desc":""},{"name":"mutually-exclusive multi-value controls). Keyboard: Arrow ←/","desc":","},{"name":"Home/End to jump.","desc":""},{"name":"• Tokens hoisted (0 magic numbers); honors prefers-reduced-motion.","desc":""},{"name":"• Selected rung sets aria-checked=\"true\" and updates","desc":""},{"name":"`window.ANTE_BET_RUNG_ID` / `window.ANTE_BET_COST_MULT` /","desc":""},{"name":"`window.ANTE_BET_TRIGGER_MULT` synchronously for math hook-ups.","desc":""},{"name":"• Mutex flag `window.__ANTE_BET_LADDER_ solveConfig"],"emittedEvents":["onBetChanged"],"lifecycleHooks":["onAutoplayStart","onAutoplayStop","onFsEnd","onFsTrigger","postSpin","preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"bidirectionalWaysEval","category":"evaluator","description":"Wave LEGO-BW1 — Bidirectional ways evaluator (\"win-both-ways\").","file":"src/blocks/bidirectionalWaysEval.mjs","testFile":"tests/blocks/bidirectionalWaysEval.test.mjs","loc":640,"exports":["defaultConfig","emitBidirectionalWaysEvalCSS","emitBidirectionalWaysEvalMarkup","emitBidirectionalWaysEvalRuntime","evaluateLTR","evaluateRTL","resolveConfig"],"emittedEvents":["onBidirectionalWaysCleared","onBidirectionalWaysPay"],"lifecycleHooks":["onFsEnd","onSpinResult","preSpin"],"purpose":"───────\n  Industry-reference \"win-both-ways\" paytable evaluator. Walks the\n  grid in BOTH directions as SEPARATE pays:\n    • LTR — runs anchored at reel 0, marching towards reel N-1.\n    • RTL — runs anchored at reel N-1, marching towards reel 0.\n  A symbol that hits a strict consecutive run from EITHER edge of the\n  reel set scores; both directions can score on the same spin, which\n  is why a 243-ways grid becomes \"243-both-ways = 486 effective ways\".\n\n  Distinct from sibling evaluators:\n    • waysEval        — LTR by default; direction is a single knob.\n    • allWaysEval     — any consecutive position, not edge-anchored.\n    • payAnywhereEval — count-based scatter pays, no geometry at all.\n  This block is the STRICTER edge-anchored subset, intentionally a\n  separate LEGO piece so the LTR/RTL semantics are explicit and the\n  pays land as two distinct events on the bus.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Classic \"win-both-ways pattern\" — a wide industry baseline where the\n  leftmost-anchored runs and rightmost-anchored runs are independent\n  awards stacked together on the round.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitBidirectionalWaysEvalCSS(cfg)\n  emitBidirectionalWaysEvalMarkup(cfg)\n  emitBidirectionalWaysEvalRuntime(cfg)\n  evaluateLTR(grid, paytable, minRunLength, wildId)   (pure helper, exported for tests)\n  evaluateRTL(grid, paytable, minRunLength, wildId)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onSpinResult (priority 80) — evaluates both directions on settle\n    • preSpin       (priority 80) — clears any prior highlight + state\n    • onFsEnd       (priority 80) — clears state on FS exit\n  emits:\n    • onBidirectionalWaysPay     { wins, ltrCount, rtlCount, totalPayX }\n    • onBidirectionalWaysCleared {}","industryRef":"───────────────────────────────────\n  Classic \"win-both-ways pattern\" — a wide industry baseline where the\n  leftmost-anchored runs and rightmost-anchored runs are independent\n  awards stacked together on the round.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitBidirectionalWaysEvalCSS(cfg)\n  emitBidirectionalWaysEvalMarkup(cfg)\n  emitBidirectionalWaysEvalRuntime(cfg)\n  evaluateLTR(grid, paytable, minRunLength, wildId)   (pure helper, exported for tests)\n  evaluateRTL(grid, paytable, minRunLength, wildId)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onSpinResult (priority 80) — evaluates both directions on settle\n    • preSpin       (priority 80) — clears any prior highlight + state\n    • onFsEnd       (priority 80) — clears state on FS exit\n  emits:\n    • onBidirectionalWaysPay     { wins, ltrCount, rtlCount, totalPayX }\n    • onBidirectionalWaysCleared {}","publicApi":[],"lifecycle":{"subscribes":["• onSpinResult (priority 80) — evaluates both directions on settle","• preSpin       (priority 80) — clears any prior highlight + state","• onFsEnd       (priority 80) — clears state on FS exit"],"emits":["• onBidirectionalWaysPay     { wins, ltrCount, rtlCount, totalPayX }","• onBidirectionalWaysCleared {}"]}},{"name":"bigSymbolRender2x2","category":"uncategorised","description":"Wave D-17.2 (Foundry-family gap closure) — Oversized \"big\" symbol","file":"src/blocks/bigSymbolRender2x2.mjs","testFile":"tests/blocks/bigSymbolRender2x2.test.mjs","loc":646,"exports":["countUnits","defaultConfig","emitBigSymbolRender2x2CSS","emitBigSymbolRender2x2Runtime","findBigSymbolFootprints","resolveConfig"],"emittedEvents":["onBigSymbolMounted","onBigSymbolUnmounted"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onSpinResult","onTumbleStep","preSpin"],"purpose":"Provides a vendor-neutral, math-blind, opt-in renderer that takes\n  the configured \"big\" symbol kinds (`{ symbol, geometry: '2x2' | '3h'\n  | 'fullReel' }`) and (a) decorates the underlying grid cells with\n  the oversized art via CSS span overrides, and (b) exposes a\n  `countUnits(grid)` helper the engine uses for trigger thresholds\n  where the count basis is UNITS, not occupied cells.\n\nUnit-vs-cell semantics\n  GDD §06.4 / §8.5.0 (Foundry production brief):\n  \"Big Fireball renders 2×2 (4 cells) and the threshold is 9+ — is\n   geometrically impossible on the 5×3 / 15-cell board (9 × 4 = 36\n   cells > 15). The threshold must therefore be defined on a basis\n   that the 15-cell board can satisfy: the threshold is counted PER\n   BIG SYMBOL INSTANCE, never per occupied cell.\"\n  This block enforces the same rule by tagging the top-left cell of\n  each detected big-symbol footprint as the canonical UNIT cell, and\n  counting only those UNITs toward the threshold. The other 3 cells\n  (in 2×2) or 2 cells (in 3-high) are tagged as `is-big-companion`\n  and skipped by the counter.\n\nIndustry reference (vendor-neutral, industry baseline):\n  Multi-cell \"big\" symbol rendering is an industry baseline going\n  back to physical reels with literal jumbo print (1980s). On modern\n  video reels the standard rendering rules are:\n    • 2×2 oversized — bonus / cash / scatter feature symbols\n    • 3-high \"tall\" — fully expanded Wilds on rectangular grids\n    • full-reel — reel-tall stacked symbols (e.g. mystery stacks)\n  This block normalizes those three geometries to a single rendering\n  contract.","industryRef":"","publicApi":[{"name":"export function defaultConfig(): BigSymbolRenderConfig","desc":""},{"name":"export function resolveConfig(model?: object): BigSymbolRenderConfig","desc":""},{"name":"export function emitBigSymbolRender2x2CSS(cfg): string","desc":""},{"name":"export function emitBigSymbolRender2x2Runtime(cfg): string","desc":""},{"name":"export function countUnits(grid, cfg): number  (test-exposed)","desc":""},{"name":"export function findBigSymbolFootprints(grid, cfg): Footprint[]","desc":""},{"name":"Lifecycle (when enabled)","desc":""},{"name":"• onSpinResult / onFsSpinResult","desc":"scan grid → emit"},{"name":"onBigSymbolMounted per detected unit (top-left cell tagged) +","desc":""},{"name":"mount oversized art layer","desc":""},{"name":"• onTumbleStep","desc":"re-scan after tumble refill (units may shift)"},{"name":"• postSpin","desc":"leave units mounted; presentation layer owns fade"},{"name":"• onSpinStart / preSpin","desc":"unmount all previous units"},{"name":"HookBus events (sole emitter contract)","desc":""},{"name":"• onBigSymbolMounted    payload: { symbol, geometry, anchorReel, anchorRow, footprint }","desc":""},{"name":"• onBigSymbolUnmounted  payload: { symbol, geometry, anchorReel, anchorRow }","desc":""},{"name":"Force chip (per rule_force_buttons_real_spin)","desc":""},{"name":"• window.bigSymbolForceAt(symbol, geometry, reel, row)","desc":""},{"name":"","desc":"sets window.__FORCE_BIG_SYMBOL__ = { symbol, geometry, reel, row }"},{"name":"","desc":"triggers runOneBaseSpin() (routes through real engine path)"},{"name":"","desc":"engine bakes the requested big-symbol footprint into the grid"},{"name":"for that spin; on settle, the block detects + mounts as","desc":""},{"name":"organic detection. If the engine ignores the flag, the runtime","desc":""},{"name":"falls back to a same-spin synthetic mount so the QA chip stays","desc":""},{"name":"visually truthful — never a payout shortcut.","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"bigWinTier","category":"round-control","description":"Five-tier celebration ladder for any win whose total-award-to-bet ratio","file":"src/blocks/bigWinTier.mjs","testFile":"tests/blocks/bigWinTier.test.mjs","loc":1552,"exports":["BIG_WIN_TIER_IDS","defaultConfig","emitBigWinTierCSS","emitBigWinTierMarkup","emitBigWinTierRuntime","resolveConfig"],"emittedEvents":["onBigWinTierEnd","onBigWinTierEntered","onBigWinTierExited"],"lifecycleHooks":["onSkipRequested","onWinPresentationEnd","preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"bonusBuy","category":"feature","description":"When GDD declares a `bonus_buy` feature, this block emits a \"Buy Bonus\"","file":"src/blocks/bonusBuy.mjs","testFile":"tests/blocks/bonusBuy.test.mjs","loc":294,"exports":["defaultConfig","emitBonusBuyCSS","emitBonusBuyMarkup","emitBonusBuyRuntime","resolveConfig"],"emittedEvents":["onBonusBuyRequested"],"lifecycleHooks":["onFsEnd","onFsTrigger"],"purpose":"When GDD declares a `bonus_buy` feature, this block emits a \"Buy Bonus\"\n  button in the footer (default `enabled: false`) plus a runtime click listener that forces\n  a free-spins trigger by injecting N guaranteed scatters into the next spin.\n  The button label carries the cost-multiplier baked from the GDD\n  (default 75× current bet — industry-median midpoint).\n\nIndustry-reference (vendor-neutral):\n  \"Bonus buy\" is now a cross-vendor industry baseline feature in\n  non-restricted jurisdictions: a single button that costs 50-100× the\n  current bet and guarantees a free-spins entry on the next spin. The\n  block models the visual + control surface only; the math layer\n  (real-cash deduction, RTP rebalance) lands with PAR hot-swap in\n  Phase 2.","industryRef":"\"Bonus buy\" is now a cross-vendor industry baseline feature in\n  non-restricted jurisdictions: a single button that costs 50-100× the\n  current bet and guarantees a free-spins entry on the next spin. The\n  block models the visual + control surface only; the math layer\n  (real-cash deduction, RTP rebalance) lands with PAR hot-swap in\n  Phase 2.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitBonusBuyCSS(cfg)","desc":"CSS string (button styles)"},{"name":"emitBonusBuyMarkup(cfg)","desc":"HTML string (button host)"},{"name":"emitBonusBuyRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  — (none — purely user-input driven)","desc":""},{"name":"emits:       onBonusBuyRequested { scatterCount, costX }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• Button is a real <button> with aria-label + visible focus ring.","desc":""},{"name":"• Optional `confirmMessage` GDD knob","desc":"confirm() before commit."},{"name":"• CSS / Markup / Runtime emitters all gate on `cfg.enabled`.","desc":""},{"name":"• Re-arm guard (`rearmMs`) prevents double-click spam.","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["— (none — purely user-input driven)"],"emits":["onBonusBuyRequested { scatterCount, costX }","a11y / perf:","• Button is a real <button> with aria-label + visible focus ring.","• Optional `confirmMessage` GDD knob → confirm() before commit.","• CSS / Markup / Runtime emitters all gate on `cfg.enabled`.","• Re-arm guard (`rearmMs`) prevents double-click spam.","/"]}},{"name":"bonusBuyDeterministic","category":"feature","description":"The modern Bonus Buy ecosystem evolved beyond the original \"pay N×","file":"src/blocks/bonusBuyDeterministic.mjs","testFile":"tests/blocks/bonusBuyDeterministic.test.mjs","loc":687,"exports":["defaultConfig","emitBonusBuyDeterministicCSS","emitBonusBuyDeterministicMarkup","emitBonusBuyDeterministicRuntime","resolveConfig"],"emittedEvents":["onBonusBuyTierSelected","onDeterministicPlantApplied"],"lifecycleHooks":["onFsEnd","onFsTrigger","onSpinResult","postSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"bonusBuyMenu","category":"feature","description":"Wave LEGO-BUY (4 / 8) — Multi-tier bonus buy menu.","file":"src/blocks/bonusBuyMenu.mjs","testFile":"tests/blocks/bonusBuyMenu.test.mjs","loc":537,"exports":["defaultConfig","emitBonusBuyMenuCSS","emitBonusBuyMenuMarkup","emitBonusBuyMenuRuntime","resolveConfig"],"emittedEvents":["onBonusBuyMenuClosed","onBonusBuyMenuOpened","onBonusBuyMenuTierSelected"],"lifecycleHooks":["onFsEnd","onFsTrigger"],"purpose":"When GDD declares `bonus_buy_menu` (or `bonus_buy.tiers[]`), this block\n  replaces the single-cost `bonusBuy` button with a dropdown / sheet that\n  exposes several buy tiers (e.g. Standard FS @ 75×, Super FS @ 200×,\n  Mega FS @ 500×). Each tier carries its own `costX`, `forceScatters`,\n  `fsMode` payload so the math layer can branch on the chosen mode.\n  The block is mutually exclusive with `bonusBuy.mjs` — orchestrator\n  prefers the menu when both resolve enabled.\n\nIndustry-reference (vendor-neutral):\n  Multi-tier \"buy ladder\" is the post-2023 industry convention for slots\n  that ship multiple bonus modes (e.g. \"Bonus Hunt 80× / Super Bonus\n  200× / Mega Bonus 500×\"). Tier counts of 2–5 are standard; tier names\n  carry meaningful UX weight (Standard / Super / Mega / Ultra). The\n  block models the visual + control surface only — real-cash deduction\n  + per-tier RTP balance land with PAR hot-swap (Phase 2).","industryRef":"Multi-tier \"buy ladder\" is the post-2023 industry convention for slots\n  that ship multiple bonus modes (e.g. \"Bonus Hunt 80× / Super Bonus\n  200× / Mega Bonus 500×\"). Tier counts of 2–5 are standard; tier names\n  carry meaningful UX weight (Standard / Super / Mega / Ultra). The\n  block models the visual + control surface only — real-cash deduction\n  + per-tier RTP balance land with PAR hot-swap (Phase 2).","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults (1 sample tier)"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitBonusBuyMenuCSS(cfg)","desc":"CSS string (button + menu sheet)"},{"name":"emitBonusBuyMenuMarkup(cfg)","desc":"HTML string (button + menu host)"},{"name":"emitBonusBuyMenuRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"BONUS_BUY_BANNED_JURISDICTIONS","desc":"re-exported hard-ban list"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onFsTrigger (disable while in bonus)","desc":""},{"name":"onFsEnd     (re-enable on bonus end)","desc":""},{"name":"emits:       onBonusBuyMenuOpened   { tierCount }","desc":""},{"name":"onBonusBuyMenuClosed   { reason }","desc":""},{"name":"onBonusBuyMenuTierSelected { tierId, costX, forceScatters, fsMode }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• Trigger is a real <button> with aria-haspopup=\"menu\" + aria-expanded.","desc":""},{"name":"• Menu uses role=\"menu\" / role=\"menuitem\"; Arrow / Home / End / Esc nav.","desc":""},{"name":"• Trapped focus while open; restored on close.","desc":""},{"name":"• Optional `confirmMessage` GDD knob","desc":"confirm() per tier commit."},{"name":"• Tokens hoisted (0 magic numbers); honors prefers-reduced-motion.","desc":""},{"name":"• Re-arm guard (`rearmMs`) prevents double-pick spam.","desc":""},{"name":"• Hard-disabled under UKGC / SE / DE / NL (same matrix as bonusBuy).","desc":""},{"name":"Mutex with `bonusBuy.mjs`:","desc":""},{"name":"Orchestrator wires bonusBuy XOR bonusBuyMenu — never both. When the","desc":""},{"name":"menu is enabled (tiers.length >= 2), bonusBuy block must self-disable","desc":""},{"name":"to avoid duplicate side-mounted controls. Runtime exposes","desc":""},{"name":"`window.__BONUS_BUY_MENU_ACTIVE__ = true` for orchestrator coordination.","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["onFsTrigger (disable while in bonus)","onFsEnd     (re-enable on bonus end)"],"emits":["onBonusBuyMenuOpened   { tierCount }","onBonusBuyMenuClosed   { reason }","onBonusBuyMenuTierSelected { tierId, costX, forceScatters, fsMode }","a11y / perf:","• Trigger is a real <button> with aria-haspopup=\"menu\" + aria-expanded.","• Menu uses role=\"menu\" / role=\"menuitem\"; Arrow / Home / End / Esc nav.","• Trapped focus while open; restored on close.","• Optional `confirmMessage` GDD knob → confirm() per tier commit.","• Tokens hoisted (0 magic numbers); honors prefers-reduced-motion.","• Re-arm guard (`rearmMs`) prevents double-pick spam.","• Hard-disabled under UKGC / SE / DE / NL (same matrix as bonusBuy).","Mutex with `bonusBuy.mjs`:","Orchestrator wires bonusBuy XOR bonusBuyMenu — never both. When the","menu is enabled (tiers.length >= 2), bonusBuy block must self-disable","to avoid duplicate side-mounted controls. Runtime exposes","`window.__BONUS_BUY_MENU_ACTIVE__ = true` for orchestrator coordination.","/"]}},{"name":"bonusClimaxReveal","category":"uncategorised","description":"When a bonus path is entered (free spins, hold-and-win, wheel bonus,","file":"src/blocks/bonusClimaxReveal.mjs","testFile":"tests/blocks/bonusClimaxReveal.test.mjs","loc":281,"exports":["defaultConfig","emitBonusClimaxRevealCSS","emitBonusClimaxRevealMarkup","emitBonusClimaxRevealRuntime","resolveConfig"],"emittedEvents":["onBonusClimaxEnd","onBonusClimaxStart"],"lifecycleHooks":["onBonusBuyTierSelected","onCreditBucketRespinStart","onDailyJackpotAward","onFsTrigger","onSkipRequested","onWheelSegmentChosen"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":["onFsTrigger          → — sticky during a single SPIN (next\n                                base spin clears it). This block is\n                                sticky during a single TUMBLE CHAIN\n                                within one spin.\n    • `expandingWild.mjs`     — wild expands to fill a reel column\n    • `walkingWild.mjs`       — wild moves one cell per FS spin\n    • `wildReel.mjs`          — entire reel becomes wild\n\n  Industry-typical persistence shape: each landed wild gets a `data-\n  wild-pinned` attribute + `is-cascade-pinned` class on the cell.\n  `onTumbleStep` listener re-asserts the pin every step so the engine\n  refilling the grid honours it.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Cascade-pays slots with persistent wild bonus mechanic — wilds\n  \"lock in\" until the chain ends. Visible CSS frame + optional\n  counter chip showing \"N pinned wilds this chain\".","industryRef":"───────────────────────────────────\n  Cascade-pays slots with persistent wild bonus mechanic — wilds\n  \"lock in\" until the chain ends. Visible CSS frame + optional\n  counter chip showing \"N pinned wilds this chain\".","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitCascadingWildPersistenceCSS(cfg)","desc":""},{"name":"emitCascadingWildPersistenceRuntime(cfg, model)","desc":""},{"name":"shouldPinCell(symbol, wildSymbolId)     (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• preSpin       (priority 24) — clear all pins (new spin)","desc":""},{"name":"• onSpinResult  (priority 24) — pin every wild landed by base spin","desc":""},{"name":"• onTumbleStep  (priority 24) — re-pin survivors + new wilds landed","desc":""},{"name":"• postSpin      (priority 24) — clear pins (spin tail)","desc":""},{"name":"emits:","desc":""},{"name":"• onCascadingWildPinned   { cellKey, totalPinne   value depends on cluster SIZE (number of connected matching cells).\n  Industry pattern: tiered ladder maps a cluster size range to a mult\n  value:\n    5–7   cells  → ×1\n    8–10  cells  → ×2\n    11–14 cells  → ×5\n    15+   cells  → ×10\n\n  Block subscribes to `onClusterPay` (emitted by clusterPaysEval block)\n  and applies the tier mult via HookBus.setMult.\n\n  Distinct from `pathAwareMultiplier.mjs` (which is per-path on\n  ways-eval) and `winMultiplierBadge.mjs` (visual chip without semantic\n  mult application).\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Tier-based cluster-size multiplier present in many cluster-pays\n  slots — common scaling pattern where bigger clusters earn\n  multiplicative bonuses on top of the size-based base payout.","industryRef":"───────────────────────────────────\n  Tier-based cluster-size multiplier present in many cluster-pays\n  slots — common scaling pattern where bigger clusters earn\n  multiplicative bonuses on top of the size-based base payout.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitClusterSizeMultiplierCSS(cfg)","desc":""},{"name":"emitClusterSizeMultiplierRuntime(cfg, model)","desc":""},{"name":"tierMultForSize(tiers, size)        (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onClusterPay   (priority 28) — apply tier mult per cluster","desc":""},{"name":"• preSpin        (priority 28) — clear last applied mult","desc":""},{"name":"emits:","desc":""},{"name":"• onClusterSizeMultiplierApplied   { clusterSize, multX }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"coinCollect","category":"uncategorised","description":"Wave LEGO-COLLECT (B-4 · 1/3) — Coin / Token collection mechanic.","file":"src/blocks/coinCollect.mjs","testFile":"tests/blocks/coinCollect.test.mjs","loc":274,"exports":["defaultConfig","emitCoinCollectCSS","emitCoinCollectMarkup","emitCoinCollectRuntime","resolveConfig"],"emittedEvents":["onCoinCollected"],"lifecycleHooks":["onFsEnd","onFsTrigger","onSpinResult"],"purpose":"When GDD declares `coin_collect` (or `token_collect`), this block\n  scans every `onSpinResult` for cells carrying a \"coin\" attribute\n  (`data-coin-value` or a configured symbol id), tallies their value\n  into a running session total exposed on `window.__COIN_COLLECT__`,\n  and emits a per-spin collect event with the picked-up cell list.\n\n  This block owns the DETECTION + ACCUMULATION half. The sibling\n  blocks own visualization (`cumulativeMeter.mjs`) and reveal\n  choreography (`collectRevealOverlay.mjs`) — together they form the\n  industry-standard \"collect-and-claim\" meta-game pattern.\n\nIndustry-reference (vendor-neutral):\n  Coin / orb / token collect is one of the dominant 2024-2026 retention\n  mechanics. Coins land on the grid at a configurable rate (typically\n  2-8% of cells per spin), the player's running total fills a meter,\n  and at a threshold the meter \"pays out\" — credits / FS trigger /\n  jackpot pick / bonus round. The pattern lives ABOVE the spin outcome\n  so even losing spins feed the meta-progress (regulator-friendly LDW\n  alternative).","industryRef":"Coin / orb / token collect is one of the dominant 2024-2026 retention\n  mechanics. Coins land on the grid at a configurable rate (typically\n  2-8% of cells per spin), the player's running total fills a meter,\n  and at a threshold the meter \"pays out\" — credits / FS trigger /\n  jackpot pick / bonus round. The pattern lives ABOVE the spin outcome\n  so even losing spins feed the meta-progress (regulator-friendly LDW\n  alternative).","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitCoinCollectCSS(cfg)","desc":"CSS string (coin-cell decoration)"},{"name":"emitCoinCollectMarkup(cfg)","desc":"HTML string (sr-only live region)"},{"name":"emitCoinCollectRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onSpinResult — scan grid for coin cells, sum into total","desc":""},{"name":"onFsTrigger  — optional reset (configurable)","desc":""},{"name":"onFsEnd      — optional resume","desc":""},{"name":"emits:       onCoinCollected { perSpinValue, cellIds, sessionTotal }","desc":""}],"lifecycle":{"subscribes":["onSpinResult — scan grid for coin cells, sum into total","onFsTrigger  — optional reset (configurable)","onFsEnd      — optional resume"],"emits":["onCoinCollected { perSpinValue, cellIds, sessionTotal }"]}},{"name":"coinShower","category":"uncategorised","description":"Wave W47.S13 — B68 · coinShower block.","file":"src/blocks/coinShower.mjs","testFile":"tests/blocks/coinShower.test.mjs","loc":357,"exports":["defaultConfig","emitCoinShowerCSS","emitCoinShowerMarkup","emitCoinShowerRuntime","resolveConfig"],"emittedEvents":["onCoinShowerEnd","onCoinShowerStart"],"lifecycleHooks":["onBigWinTierEntered","onFsTrigger","onSpinResult","onTumbleStep"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig()","desc":"safe defaults (isolated copy)"},{"name":"resolveConfig(model)","desc":"merge + clamp"},{"name":"emitCoinShowerCSS(cfg)","desc":"CSS string"},{"name":"emitCoinShowerMarkup(cfg)","desc":"HTML string"},{"name":"emitCoinShowerRuntime(cfg)","desc":"IIFE runtime"},{"name":"Lifecycle (Runtime):","desc":""},{"name":"listens : onBigWinTierEntered | onFsTrigger | onTumbleStep | onSpinResult","desc":""},{"name":"(mode-dependent — exactly one binding active per build)","desc":""},{"name":"emits   : onCoinShowerStart, onCoinShowerEnd","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"collectableSymbol","category":"uncategorised","description":"Many modern slots track a SPECIFIC symbol (typically a coin / orb / icon)","file":"src/blocks/c r-pay-type mode whitelist) of that single-rule contract.","industryRef":"","publicApi":[{"name":"export function defaultConfig(): CreditAwardConversionConfig","desc":""},{"name":"export function resolveConfig(model?: object): ...","desc":""},{"name":"export function emitCreditAwardConversionCSS(cfg): string","desc":""},{"name":"export function emitCreditAwardConversionRuntime(cfg): string","desc":""},{"name":"export function deriveCoinValue(totalBet, cfg): number       (test)","desc":""},{"name":"export function convertCredits(credits, payType, ctx, cfg): number  (test)","desc":""},{"name":"Lifecycle (when enabled)","desc":""},{"name":"• onBetChanged (or boot)","desc":"recompute coin_value + emit"},{"name":"onCoinValueChanged","desc":"tag body[data-award-unit]"},{"name":"• Any block needing to render a money string calls","desc":""},{"name":"window.creditAwardConvert(credits, payType) which returns a","desc":""},{"name":"numeric money value rounded to 2 decimals.","desc":""},{"name":"HookBus events (sole emitter contract)","desc":""},{"name":"• onCoinValueChanged   payload: { coinValue, totalBet, fixedCoinCount }","desc":""},{"name":"• onAwardConverted     payload: { credits, payType, money }","desc":""},{"name":"Force chip (per rule_force_buttons_real_spin) — not applicable.","desc":""},{"name":"The conversion is deterministic; there is no probabilistic state","desc":""},{"name":"to force. The block exposes only a getter for QA inspection.","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"cumulativeMeter","category":"uncategorised","description":"Wave LEGO-COLLECT (B-4 · 2/3) — Session-cumulative HUD meter.","file":"src/blocks/cumulativeMeter.mjs","testFile":"tests/blocks/cumulativeMeter.test.mjs","loc":335,"exports":["defaultConfig","emitCumulativeMeterCSS","emitCumulativeMeterMarkup","emitCumulativeMeterRuntime","resolveConfig"],"emittedEvents":["onCumulativeMeterReset","onCumulativeMeterThresholdHit"],"lifecycleHooks":["onCoinCollected"],"purpose":"Visible HUD widget (top-right corner default) that mirrors the\n  `window.__COIN_COLLECT__.sessionTotal` running total from\n  `coinCollect.mjs`. Renders a horizontal progress bar from current\n  value toward the next configured threshold, plus a numeric label.\n  When the meter crosses a threshold, it emits\n  `onCumulativeMeterThresholdHit` for `collectRevealOverlay.mjs` to\n  choreograph the award reveal.\n\nIndustry-reference (vendor-neutral):\n  The visible progress meter is what makes coin collection feel like\n  \"progress\" instead of slot-spin chaos. Industry standard ranges:\n  3-5 threshold tiers, ascending values (e.g. 50 / 200 / 1000), each\n  tier paying a configured award. Position: top-right HUD widget,\n  horizontal bar, animated fill, label format \"{current}/{next}\".","industryRef":"The visible progress meter is what makes coin collection feel like\n  \"progress\" instead of slot-spin chaos. Industry standard ranges:\n  3-5 threshold tiers, ascending values (e.g. 50 / 200 / 1000), each\n  tier paying a configured award. Position: top-right HUD widget,\n  horizontal bar, animated fill, label format \"{current}/{next}\".","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitCumulativeMeterCSS(cfg)","desc":"CSS string (HUD widget)"},{"name":"emitCumulativeMeterMarkup(cfg)","desc":"HTML string (HUD host)"},{"name":"emitCumulativeMeterRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onCoinCollected — re-render fill + label, threshold check","desc":""},{"name":"emits:       onCumulativeMeterThresholdHit { threshold, awardKind, awardValue, tierIndex }","desc":""},{"name":"onCumulativeMeterReset        { reason }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• role=\"progressbar\" with aria-valuenow / aria-valuemin / aria-valuemax","desc":""},{"name":"+ aria-va ,"file":"src/blocks/denmarkComplianceGate.mjs","testFile":"tests/blocks/denmarkComplianceGate.test.mjs","loc":101,"exports":["DK_MIN_SPIN_MS_BOUNDS","DK_MIN_SPIN_MS_DEFAULT","DK_RC_BOUNDS","DK_RC_DEFAULT","defaultConfig","emitDenmarkComplianceGateCSS","emitDenmarkComplianceGateRuntime","resolveConfig"],"emittedEvents":["onDkLossLimitRequired","onDkMinSpinPaceEnforced","onDkRealityCheckEnforced","onDkRofusCheckRequired"],"lifecycleHooks":[],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"dualRoleScatter","category":"uncategorised","description":"Many modern games extend the classic scatter so the symbol carries TWO","file":"src/blocks/dualRoleScatter.mjs","testFile":"tests/blocks/dualRoleScatter.test.mjs","loc":218,"exports":["defaultConfig","emitDualRoleScatterCSS","emitDualRoleScatterMarkup","emitDualRoleScatterRuntime","resolveConfig"],"emittedEvents":["onDualRoleActivated"],"lifecycleHooks":["onFsTrigger","onTumbleStep","postSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitDualRoleScatterCSS(cfg)","desc":""},{"name":"emitDualRoleScatterMarkup(cfg)","desc":"empty (decoration via runtime)"},{"name":"emitDualRoleScatterRuntime(cfg)","desc":""}],"lifecycle":{"subscribes":["postSpin          → scan grid for scatter cells, annotate role,","emit per landed scatter","onTumbleStep      → re-scan after cascade (scatters can land again)","onFsTrigger       → emit role='scatter' for trigger-count cells"],"emits":["onDualRoleActivated { reel, row, sym, role: 'wild'|'pay'|'scatter' }","a11y:","- Cell decoration adds aria-label suffix \"(scatter, wild role)\".","- prefers-reduced-motion kills the dual-role pulse.","Vendor-neutral. No game / studio strings.","@module dualRoleScatter","/"]}},{"name":"dynamicWaysEngine","category":"uncategorised","description":"Wave LEGO-DWE — Dynamic Ways Engine (variable rows per reel).","file":"src/blocks/dynamicWaysEngine.mjs","testFile":"tests/blocks/dynamicWaysEngine.test.mjs","loc":502,"exports":["computeWaysCount","defaultConfig","emitDynamicWaysEngineCSS","emitDynamicWaysEngineMarkup","emitDynamicWaysEngineRuntime","resolveConfig","rollRowsPerReel"],"emittedEvents":["onWaysResetForRound","onWaysReshaped"],"lifecycleHooks":["onFsEnd","onFsTrigger","onSpinResult","preSpin"],"purpose":"───────\n  Industry-reference \"variable rows per reel\" ways system. Each spin\n  the engine rolls a row count for every reel column (within configured\n  min/max bounds) and computes the total winning ways as the product\n  of those per-reel row counts. A HUD chip paints the current total\n  so the player always sees the live ways count. Distinct from:\n    • clusterPaysEval         (cluster topology, no row/column ways)\n    • infinityReels           (extends reel COUNT, not rows per reel)\n    • holdAndWin              (fixed grid, locked symbols, no ways reshape)\n    • walkingWildStepper      (single reel-bound wild, fixed grid)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Classic \"variable rows per reel pattern\" — instead of a fixed\n  rectangular grid with a constant ways count, every spin builds a\n  ragged grid where reel heights are drawn from a uniform or weighted\n  distribution. Total ways = product of row counts across all reels;\n  for a 6-reel 2..7 rows uniform draw the maximum reachable count is\n  2*3*4*5*6*7 = 5040 or 7*7*7*7*7*7 = 117649 depending on bound mix.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitDynamicWaysEngineCSS(cfg)\n  emitDynamicWaysEngineMarkup(cfg)\n  emitDynamicWaysEngineRuntime(cfg)\n  rollRowsPerReel(reelCount, minRows, maxRows, rng, distribution, weights)  (pure helper, exported for tests)\n  computeWaysCount(rowsPerReel)                                              (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • preSpin        (priority 25) — rolls rowsPerReel for the upcoming spin\n    • onSpinResult   (priority 25) — computes total ways, paints HUD, emits onWaysReshaped\n    • onFsTrigger    (priority 25) — emits onWaysResetForRound for the FS entry\n    • onFsEnd        (priority 25) — emits onWaysResetForRound for FS exit\n  emits:\n    • onWaysReshaped       { rowsPerReel, totalWays }\n    • onWaysResetForRound  {}","industryRef":"───────────────────────────────────\n  Classic \"variable rows per reel pattern\" — instead of a fixed\n  rectangular grid with a constant ways count, every spin builds a\n  ragged grid where reel heights are drawn from a uniform or weighted\n  distribution. Total ways = product of row counts across all reels;\n  for a 6-reel 2..7 rows uniform draw the maximum reachable count is\n  2*3*4*5*6*7 = 5040 or 7*7*7*7*7*7 = 117649 depending on bound mix.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitDynamicWaysEngineCSS(cfg)\n  emitDynamicWaysEngineMarkup(cfg)\n  emitDynamicWaysEngineRuntime(cfg)\n  rollRowsPerReel(reelCount, minRows, maxRows, rng, distribution, weights)  (pure helper, exported for tests)\n  computeWaysCount(rowsPerReel)                                              (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • preSpin        (priority 25) — rolls rowsPerReel for the upcoming spin\n    • onSpinResult   (priority 25) — computes total ways, paints HUD, emits onWaysReshaped\n    • onFsTrigger    (priority 25) — emits onWaysResetForRound for the FS entry\n    • onFsEnd        (priority 25) — emits onWaysResetForRound for FS exit\n  emits:\n    • onWaysReshaped       { rowsPerReel, totalWays }\n    • onWaysResetForRound  {}","publicApi":[],"lifecycle":{"subscribes":["• preSpin        (priority 25) — rolls rowsPerReel for the upcoming spin","• onSpinResult   (priority 25) — computes total ways, paints HUD, emits onWaysReshaped","• onFsTrigger    (priority 25) — emits onWaysResetForRound for the FS entry","• onFsEnd        (priority 25) — emits onWaysResetForRound for FS exit"],"emits":["• onWaysReshaped       { rowsPerReel, totalWays }","• onWaysResetForRound  {}"]}},{"name":"energyMeter","category":"uncategorised","description":"feature (e.g. \"ENERGY 7/10\") that fills on qualifying events","file":"src/blocks/energyMeter.mjs","testFile":"tests/blocks/energyMeter.test.mjs","loc":269,"exports":["defaultConfig","emitEnergyMeterCSS","emitEnergyMeterMarkup","emitEnergyMeterRuntime","resolveConfig"],"emittedEvents":["onEnergyChange","onEnergyFull"],"lifecycleHooks":["onEnergyTick","onFsEnd","onSpinResult","onTumbleStep","preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":["preSpin            — show meter when first spin happens","onSpinResult       — fill per 'spin' / 'win' / 'scatter' strategy","onTumbleStep       — fill per 'tumble' strategy","onEnergyTick       — fill per 'custom' strategy (operator-driven)","onFsEnd            — optional reset based on resetOnFsEnd"],"emits":["onEnergyChange  { from, to, max }  — every visible delta","onEnergyFull                        — when meter reaches max","a11y:","- role=\"progressbar\" + aria-valuemin/max/now + aria-label.","- prefers-reduced-motion kills the fill transition.","- Apple HIG 11px font-size floor.","Vendor-neutral. No game / studio strings.","/"]}},{"name":"euAiActComplianceGate","category":"uncategorised","description":"W58.J-EU — EU AI Act (Regulation 2024/1689) compliance gate.","file":"src/blocks/euAiActComplianceGate.mjs","testFile":"tests/blocks/euAiActComplianceGate.test.mjs","loc":197,"exports":["EU_AI_ACT_PROHIBITED_PRACTICES","defaultConfig","emitEuAiActComplianceGateCSS","emitEuAiActComplianceGateRuntime","resolveConfig"],"emittedEvents":["onAiActDdaProhibited","onAiSystemDeclarationRequired"],"lifecycleHooks":[],"purpose":"","industryRef":"","publicApi":[{"name":"export const EU_AI_ACT_PROHIBITED_PRACTICES","desc":""},{"name":"export function defaultConfig(): EuAiActComplianceGateConfig","desc":""},{"name":"export function resolveConfig(model?: object): EuAiActComplianceGateConfig","desc":""},{"name":"export function emitEuAiActComplianceGateCSS(cfg): string  (no-op)","desc":""},{"name":"export function emitEuAiActComplianceGateRuntime(cfg): string","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"expandingWild","category":"wild","description":"When GDD declares an `expanding_wild` feature, this block emits:","file":"src/blocks/expandingWild.mjs","testFile":"tests/blocks/expandingWild.test.mjs","loc":205,"exports":["defaultConfig","emitExpandingWildCSS","emitExpandingWildRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onFsTrigger","onSpinResult","preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"expandingWildMultiplier","category":"wild","description":"Wave LEGO-EWM — Expanding wild + ×N multiplier tag.","file":"src/blocks/expandingWildMultiplier.mjs","testFile":"tests/blocks/expandingWildMultiplier.test.mjs","loc":467,"exports":["aggregateWildMults","defaultConfig","emitExpandingWildMultiplierCSS","emitExpandingWildMultiplierMarkup","emitExpandingWildMultiplierRuntime","resolveConfig","rollWildMultiplier"],"emittedEvents":["onExpandingWildMultRolled","onExpandingWildMultsCleared"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onSpinResult","preSpin"],"purpose":"───────\n  When a wild lands on a reel, the wild EXPANDS to cover the entire\n  reel AND carries a ×N multiplier tag drawn from a weighted\n  distribution. Every win-line passing through an expanded reel is\n  multiplied by that reel's tag value. Multiple expanded reels combine\n  per the `aggregation` knob:\n    • 'multiplicative' → reel tags multiply  (×2 × ×3 = ×6)\n    • 'additive'       → reel tags sum       (×2 + ×3 = ×5)\n\n  Distinct from sibling blocks:\n    • fsExpansionWilds    — FS-only sticky reels, no per-reel mult tag\n    • multiplierOrb       — per-cell symbol-bound mult, no expansion\n    • persistentMultiplier — round-accumulating mult, no wild expansion\n    • holdAndWinLockedOrbMultiplier — H&W lock-time mult, not wild-driven\n\n  Distinguishing features of this block:\n    • Works in BASE and/or FS (`appliesIn` knob), NOT sticky between\n      spins — per-spin paint that clears on next `preSpin`\n    • Multiplier value is per-reel (not per-cell, not per-round)\n    • Hard-gated OFF while Hold & Win is active so that two reel-paint\n      systems do not collide\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Common \"expanding wild with multiplier\" frame seen across video\n  slots: wild substitution expands the column, with a value chip\n  displayed on the reel. Multiple chips combine into one round\n  multiplier on line wins.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitExpandingWildMultiplierCSS(cfg)\n  emitExpandingWildMultiplierMarkup(cfg)\n  emitExpandingWildMultiplierRuntime(cfg)\n  rollWildMultiplier(distribution, rng)        (pure helper)\n  aggregateWildMults(values, mode)             (pure helper, locked-orb-compatible)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • preSpin          (priority 30) — clears prior paint + tags, resets HookBus.setMult\n    • onSpinResult     (priority 30) — base-game scan + paint + tag (when appliesIn ∈ {base, both})\n    • onFsSpinResult   (priority 30) — FS scan + paint + tag        (when appliesIn ∈ {fs,   both})\n    • onFsEnd          (priority 30) — final clear when FS round ends\n  emits:\n    • onExpandingWildMultRolled   { reelIdx, multX }\n    • onExpandingWildMultsCleared { count }","industryRef":"───────────────────────────────────\n  Common \"expanding wild with multiplier\" frame seen across video\n  slots: wild substitution expands the column, with a value chip\n  displayed on the reel. Multiple chips combine into one round\n  multiplier on line wins.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitExpandingWildMultiplierCSS(cfg)\n  emitExpandingWildMultiplierMarkup(cfg)\n  emitExpandingWildMultiplierRuntime(cfg)\n  rollWildMultiplier(distribution, rng)        (pure helper)\n  aggregateWildMults(values, mode)             (pure helper, locked-orb-compatible)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • preSpin          (priority 30) — clears prior paint + tags, resets HookBus.setMult\n    • onSpinResult     (priority 30) — base-game scan + paint + tag (when appliesIn ∈ {base, both})\n    • onFsSpinResult   (priority 30) — FS scan + paint + tag        (when appliesIn ∈ {fs,   both})\n    • onFsEnd          (priority 30) — final clear when FS round ends\n  emits:\n    • onExpandingWildMultRolled   { reelIdx, multX }\n    • onExpandingWildMultsCleared { count }","publicApi":[],"lifecycle":{"subscribes":["• preSpin          (priority 30) — clears prior paint + tags, resets HookBus.setMult","• onSpinResult     (priority 30) — base-game scan + paint + tag (when appliesIn ∈ {base, both})","• onFsSpinResult   (priority 30) — FS scan + paint + tag        (when appliesIn ∈ {fs,   both})","• onFsEnd          (priority 30) — final clear when FS round ends"],"emits":["• onExpandingWildMultRolled   { reelIdx, multX }","• onExpandingWildMultsCleared { count }"]}},{"name":"forceSkip","category":"round-control","description":"• A button shown during win-presentation, FS-intro, FS-outro, and","file":"src/blocks/forceSkip.mjs","testFile":"tests/blocks/forceSkip.test.mjs","loc":441,"exports":["defaultConfig","emitForceSkipCSS","emitForceSkipMarkup","emitForceSkipRuntime","resolveConfig"],"emittedEvents":["onSkipRequested"],"lifecycleHooks":["onF
