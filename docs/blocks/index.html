g a FS spin","file":"src/blocks/fsExpansionWilds.mjs","testFile":"tests/blocks/fsExpansionWilds.test.mjs","loc":323,"exports":["defaultConfig","emitFsExpansionWildsCSS","emitFsExpansionWildsMarkup","emitFsExpansionWildsRuntime","resolveConfig","shouldExpandReel"],"emittedEvents":["onExpansionWildAdded","onExpansionWildsCleared"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onFsTrigger","preSpin"],"purpose":"───────\n  Free Spins feature where any wild landing in a reel during a FS spin\n  EXPANDS to cover the entire reel (every cell becomes wild) AND\n  REMAINS STICKY for the remainder of the FS round. Sticky reels\n  accumulate across FS spins until the round ends or `maxStickyReels`\n  is reached. On `onFsEnd` the state and visuals are cleared.\n\n  Distinct from:\n    • multiplierLadder       (progressive multiplier, no reel paint)\n    • persistentMultiplier   (mult accumulates, no wild expansion)\n    • perFsSpinMultiplier    (per-spin random mult, no sticky)\n    • multiplierOrb          (per-cell symbol-bound mult, transient)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Common Free Spins frame: each wild that drops in a column locks\n  the column to full-wild for the rest of the round. Hit-frequency\n  amplifier — turns later FS spins into high-volatility full-reel\n  substitution events.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitFsExpansionWildsCSS(cfg)\n  emitFsExpansionWildsMarkup(cfg)\n  emitFsExpansionWildsRuntime(cfg)\n  shouldExpandReel(stickySet, reelIdx, maxReels)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsTrigger     (priority 30) — init FSEW_STATE.stickyReels\n    • onFsSpinResult  (priority 30) — scan grid, add new sticky reels, paint cells\n    • onFsEnd         (priority 30) — clear state + clear .is-expansion-wild\n    • preSpin         (priority 30) — no-op (sticky preserves between FS spins)\n  emits:\n    • onExpansionWildAdded     { reelIdx }\n    • onExpansionWildsCleared  { count }","industryRef":"───────────────────────────────────\n  Common Free Spins frame: each wild that drops in a column locks\n  the column to full-wild for the rest of the round. Hit-frequency\n  amplifier — turns later FS spins into high-volatility full-reel\n  substitution events.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitFsExpansionWildsCSS(cfg)\n  emitFsExpansionWildsMarkup(cfg)\n  emitFsExpansionWildsRuntime(cfg)\n  shouldExpandReel(stickySet, reelIdx, maxReels)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsTrigger     (priority 30) — init FSEW_STATE.stickyReels\n    • onFsSpinResult  (priority 30) — scan grid, add new sticky reels, paint cells\n    • onFsEnd         (priority 30) — clear state + clear .is-expansion-wild\n    • preSpin         (priority 30) — no-op (sticky preserves between FS spins)\n  emits:\n    • onExpansionWildAdded     { reelIdx }\n    • onExpansionWildsCleared  { count }","publicApi":[],"lifecycle":{"subscribes":["• onFsTrigger     (priority 30) — init FSEW_STATE.stickyReels","• onFsSpinResult  (priority 30) — scan grid, add new sticky reels, paint cells","• onFsEnd         (priority 30) — clear state + clear .is-expansion-wild","• preSpin         (priority 30) — no-op (sticky preserves between FS spins)"],"emits":["• onExpansionWildAdded     { reelIdx }","• onExpansionWildsCleared  { count }"]}},{"name":"fsPersistentJackpotPool","category":"uncategorised","description":"Wave LEGO-FS2.2 — Persistent jackpot pool across FS spins.","file":"src/blocks/fsPersistentJackpotPool.mjs","testFile":"tests/blocks/fsPersistentJackpotPool.test.mjs","loc":373,"exports":["computePoolBump","defaultConfig","emitFsPersistentJackpotPoolCSS","emitFsPersistentJackpotPoolMarkup","emitFsPersistentJackpotPoolRuntime","resolveConfig"],"emittedEvents":["onFsJackpotPoolBumped","onFsJackpotPoolEndRequested","onFsJackpotPoolPaidOut"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onFsTrigger","onScatterCelebrationStart","onSpinResult"],"purpose":"───────\n  FS round maintains a JACKPOT POOL (×bet units) that:\n    • starts at a configured floor on FS_TRIGGER,\n    • increments by a fixed delta + optional fraction of EACH FS spin win,\n    • carries over BETWEEN FS spins (does NOT reset per spin),\n    • PAYS OUT in full on a configurable trigger condition:\n        - on `payoutTrigger: 'fsEnd'` → pays on FS round end\n        - on `payoutTrigger: 'maxScatters'` → pays when N scatters land\n\n  Industry-typical \"progressive jackpot pool\" pattern across many\n  bonus-rich FS rounds. Distinct from existing jackpot blocks:\n\n    • `jackpotLadderRooms.mjs`             — tier escalator (MINI..GRAND)\n    • `holdAndWinRoomJackpotMultiplier.mjs` — H&W room promo\n    • `jackpotPicker.mjs`                  — H&W pick-bonus jackpot reveal\n\n  This block manages the in-FS accumulating pool — independent of\n  H&W and ladder rooms.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Persistent jackpot pool found on cascade/ways FS bonuses — pool\n  grows visibly throughout the round, pays out at terminal event.","industryRef":"───────────────────────────────────\n  Persistent jackpot pool found on cascade/ways FS bonuses — pool\n  grows visibly throughout the round, pays out at terminal event.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitFsPersistentJackpotPoolCSS(cfg)","desc":""},{"name":"emitFsPersistentJackpotPoolMarkup(cfg)","desc":""},{"name":"emitFsPersistentJackpotPoolRuntime(cfg, model)","desc":""},{"name":"computePoolBump(currentPool, winX, deltaPerSpin, winFraction)   (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onFsTrigger       (priority 31) — init pool at floor, show HUD","desc":""},{"name":"• onFsSpinResult    (priority 31) — increment pool by delta + winFraction*winX","desc":""},{"name":"• onFsEnd           (priority 31) — pay out (if fsEnd) + reset state","desc":""},{"name":"emits:","desc":""},{"name":"• onFsJackpotPoolBumped   { newPoolX, deltaX, spinWinX }","desc":""},{"name":"• onFsJackpotPoolPaidOut  { finalPoolX, trigger: 'fsEnd' | 'maxScatters' }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"fsProgressBar","category":"uncategorised","description":"exactly where they are in the FS round (e.g. \"Spin 7 of 15\"). The bar","file":"src/blocks/fsProgressBar.mjs","testFile":"tests/blocks/fsProgressBar.test.mjs","loc":310,"exports":["defaultConfig","emitFsProgressBarCSS","emitFsProgressBarMarkup","emitFsProgressBarRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onFsEnd","onFsRetrigger","onFsSpinResult","onFsTrigger"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":["onFsTrigger       — total spins awarded; show strip, set max, value=0","onFsSpinResult    — increment consumed, update fill + label","onFsEnd           — clear, hide strip after a brief hold","onFsRetrigger     — bump total + max, keep fill ratio honest"],"emits":["(none — pure presenter; no downstream side-effects)","Vendor-neutral. No game-name strings, no studio identifiers, no","proprietary cabinet vocabulary. Industry-reference is the generic","\"feature-progress chip\" UX pattern, not any particular vendor."]}},{"name":"fsReelHeightEscalation","category":"uncategorised","description":"Wave LEGO-FS3.2 — FS retrigger → reel height escalation.","file":"src/blocks/fsReelHeightEscalation.mjs","testFile":"tests/blocks/fsReelHeightEscalation.test.mjs","loc":342,"exports":["computeNewRowCount","defaultConfig","emitFsReelHeightEscalationCSS","emitFsReelHeightEscalationRuntime","resolveConfig"],"emittedEvents":["onFsReelHeightEscalated"],"lifecycleHooks":["onFsEnd","onFsRetrigger","onFsTrigger"],"purpose":"───────\n  Each FS retrigger BUMPS the visible row count of every reel by\n  `rowsPerRetrigger` (default +1), capped at `maxRows`. New rows are\n  inserted at the TOP of each reel and filled with placeholder\n  symbols until the next FS spin populates them naturally.\n\n  Industry-typical pattern: bonus-rich FS round with a \"bigger grid\"\n  reward for player persistence (more scatters during FS).\n\n  Distinct from existing FS-mod blocks:\n    • `infinityReelsEngine.mjs`     — grid grows per WIN (cascade)\n    • `dynamicWaysEngine.mjs`       — variable rows per reel (static)\n    • `retriggerMultiplierBump.mjs` — retrigger bumps MULT (not rows)\n\n  QA-DISCIPLINE (2026-06-19): This block is SIGNAL-ONLY. It mutates\n  RECT_REELS[i].visibleRows so engine code that reads visibleRows\n  per-spin (commitStopSymbols) honours new height; and it emits the\n  canonical onFsReelHeightEscalated event so a future reelEngine\n  `growReelHeight(reelIdx, newRows)` adapter (planned FS3.3) can\n  rebuild the column DOM + stripCells buffer atomically. Direct DOM\n  append from this block was removed: reels live inside reel.strip\n  wrappers (not flat in .grid-rect), and column height is CSS-baked\n  per-build → raw append corrupted the engine. Until the adapter\n  lands the HUD chip + RECT_REELS mutation provide a soft preview;\n  visible grow lands when adapter wires in.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Bigger grid retrigger\" FS pattern present on many slots —\n  physical grid growth rewards scatter persistence during FS.","industryRef":"───────────────────────────────────\n  \"Bigger grid retrigger\" FS pattern present on many slots —\n  physical grid growth rewards scatter persistence during FS.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitFsReelHeightEscalationCSS(cfg)","desc":""},{"name":"emitFsReelHeightEscalationRuntime(cfg, model)","desc":""},{"name":"computeNewRowCount(currentRows, perRetrigger, maxRows)   (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onFsTrigger    (priority 29) — snapshot baseline rows","desc":""},{"name":"• onFsRetrigger  (priority 29) — escalate row count","desc":""},{"name":"• onFsEnd        (priority 29) — restore baseline rows","desc":""},{"name":"emits:","desc":""},{"name":"• onFsReelHeightEscalated   { newRowCount, retriggerCount, perReel }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"fsSymbolUpgradeEscalation","category":"uncategorised","description":"Wave LEGO-FS2.1 — FS symbol-tier escalation.","file":"src/blocks/fsSymbolUpgradeEscalation.mjs","testFile":"tests/blocks/fsSymbolUpgradeEscalation.test.mjs","loc":347,"exports":["defaultConfig","emitFsSymbolUpgradeEscalationCSS","emitFsSymbolUpgradeEscalationMarkup","emitFsSymbolUpgradeEscalationRuntime","removeLowestTierSymbol","resolveConfig"],"emittedEvents":["onFsSymbolUpgraded"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onFsTrigger"],"purpose":"───────\n  During the FS round, the LOWEST PAYING symbol still in active use\n  gets UPGRADED to the next tier (LP → MP → HP → WILD) when an\n  in-FS milestone fires (typically a configurable spin counter or\n  a trigger payload). Removed symbols don't return that round.\n\n  Industry-typical pattern: every Nth FS spin removes the lowest\n  pay symbol from the pool and promotes the rest one tier up. Round\n  progresses naturally toward higher payouts. Distinct from existing\n  FS blocks:\n    • `freeSpins.mjs`            — base FS state machine\n    • `superchargedFs.mjs`       — FS retrigger × tier escalation\n    • `progressiveFreeSpins.mjs` — progressive ROUND multiplier\n    • `perFsSpinMultiplier.mjs`  — random ×N each FS spin\n    • `tumbleGrowingFsMultiplier.mjs` — mult grows during FS tumble\n\n  This block ONLY modifies the symbol POOL (window.POOL) — engine\n  reads pool when planting cells. Visual escalation chip shows the\n  current \"tier in play\" to the player.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Tier escalation FS\" pattern present on many cascade + ways slots\n  with bonus-rich free-spin rounds. Pool shrinks over the round,\n  guaranteeing rising-stakes payouts toward the end.","industryRef":"───────────────────────────────────\n  \"Tier escalation FS\" pattern present on many cascade + ways slots\n  with bonus-rich free-spin rounds. Pool shrinks over the round,\n  guaranteeing rising-stakes payouts toward the end.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitFsSymbolUpgradeEscalationCSS(cfg)","desc":""},{"name":"emitFsSymbolUpgradeEscalationMarkup(cfg)","desc":""},{"name":"emitFsSymbolUpgradeEscalationRuntime(cfg, model)","desc":""},{"name":"removeLowestTierSymbol(pool, tierOrder)     (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onFsTrigger      (priority 30) — init: snapshot pool + reset tier index","desc":""},{"name":"• onFsSpinResult   (priority 30) — check milestone; if hit","desc":"upgrade"},{"name":"• onFsEnd          (priority 30) — restore base pool","desc":""},{"name":"emits:","desc":""},{"name":"• onFsSymbolUpgraded   { removedSymbol, remainingSymbols, tierIndex }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"gamble","category":"feature","description":"After a winning spin, player can gamble the win. Standard variants:","file":"src/blocks/gamble.mjs","testFile":"tests/blocks/gamble.test.mjs","loc":337,"exports":["defaultConfig","emitGambleCSS","emitGambleMarkup","emitGambleRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onForceFeatureRequested","onFsEnd","onFsTrigger","postSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitGambleCSS(cfg), emitGambleMarkup(cfg), emitGambleRuntime(cfg)","desc":""},{"name":"Lifecycle (HookBus):","desc":""},{"name":"subscribes: onWinPresentationEnd (reveal gamble CTA if award > 0),","desc":""},{"name":"preSpin (hide CTA + force-close modal), onFsTrigger","desc":""},{"name":"(hide CTA during FS — RG: no gamble inside bonus)","desc":""},{"name":"emits (owned): onGambleStart, onGambleRound, onGambleResolved,","desc":""},{"name":"onGambleCollected","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"gambleSecondary","category":"feature","description":"Branch 1 — CARD GAMBLE","file":"src/blocks/gambleSecondary.mjs","testFile":"tests/blocks/gambleSecondary.test.mjs","loc":989,"exports":["defaultConfig","emitGambleSecondaryCSS","emitGambleSecondaryMarkup","emitGambleSecondaryRuntime","resolveConfig"],"emittedEvents":["onGambleEnd","onGambleRound","onGambleStart"],"lifecycleHooks":["onAutoplayStart","onAutoplayStop","onForceFeatureRequested","onFsEnd","onFsTrigger","onSkipRequested","onSpinResult","postSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"gddRealityCheck","category":"audit","description":"Wave D-18 (Boki \"ultimativna arhitektura\" 2026-06-20) — GDD-truth","file":"src/blocks/gddRealityCheck.mjs","testFile":"tests/blocks/gddRealityCheck.test.mjs","loc":447,"exports":["computeReality","defaultConfig","emitGddRealityCheckCSS","emitGddRealityCheckRuntime","resolveConfig"],"emittedEvents":["onGddRealityReport"],"lifecycleHooks":["preSpin"],"purpose":"Closes the GDD-truth pipeline at runtime. Parser publishes a\n  canonical declared-feature list; this block proves the running\n  slot actually exercises those features and nothing else. Output\n  feeds the per-game compliance scorecard + dev HUD warning.","industryRef":"","publicApi":[{"name":"export function defaultConfig(): GddRealityCheckConfig","desc":""},{"name":"export function resolveConfig(model?: object): GddRealityCheckConfig","desc":""},{"name":"export function emitGddRealityCheckCSS(cfg): string","desc":""},{"name":"export function emitGddRealityCheckRuntime(cfg): string","desc":""},{"name":"export function computeReality(declared, emitted, cfg): RealityReport","desc":""},{"name":"Lifecycle (when enabled)","desc":""},{"name":"• boot","desc":"snapshot model.__activeFeatures__ + open sample window"},{"name":"• global emit hook (HookBus._wrapAll) tracks every event name","desc":""},{"name":"• on sample window end","desc":"compute → emit onGddRealityReport"},{"name":"• dev HUD (optional, default off): mounts <div.grc-hud> with summary","desc":""},{"name":"HookBus events (sole emitter contract)","desc":""},{"name":"• onGddRealityReport   payload: { declared, emitted, dead, spurious,","desc":""},{"name":"compliance, sampleWindowMs }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"genericFeatureBanner","category":"uncategorised","description":"Wave U-FORCE-ALL.2 — Generic feature banner (fallback).","file":"src/blocks/genericFeatureBanner.mjs","testFile":"tests/blocks/genericFeatureBanner.test.mjs","loc":332,"exports":["DEDICATED_KINDS","defaultConfig","emitGenericFeatureBannerCSS","emitGenericFeatureBannerMarkup","emitGenericFeatureBannerRuntime","resolveConfig","shouldHandle"],"emittedEvents":[],"lifecycleHooks":["onForceFeatureRequested","postSpin"],"purpose":"───────\n  Catch-all listener for `onForceFeatureRequested` events whose `kind`\n  has no dedicated handler block. Renders a short overlay placard\n  (\"FEATURE TRIGGERED · <label>\"), plays a 1.2s reveal-and-fade\n  animation, then dismisses. Ensures EVERY force-chip click in\n  `universalForcePanel.mjs` produces a player-visible response, even\n  when the GDD declares a feature the simulator can't deterministically\n  simulate yet (e.g. exotic `lightning` mechanics, vendor-specific\n  `bonusPick` variants).\n\n  Kinds with a dedicated block (FS, BW, BB, H&W, multiplier orb,\n  sticky/expanding/walking wild, mystery, respin, gamble, etc.) are\n  skipped — those blocks own their own visual response. The banner\n  only fires for kinds whose block is absent OR explicitly opted out.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Stub / preview banner pattern used by every certified simulator to\n  demo features still in design. Two-tone gold-on-charcoal placard,\n  centered, scale-and-fade transition, 1.2s default dwell.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig() / resolveConfig(model)\n  emitGenericFeatureBannerCSS(cfg)\n  emitGenericFeatureBannerMarkup(cfg)\n  emitGenericFeatureBannerRuntime(cfg)\n\nLifecycle (HookBus contract — listen-only)\n──────────────────────────────────────────\n  Subscribes to: `onForceFeatureRequested`\n  Emits:         (none — pure visual feedback)","industryRef":"───────────────────────────────────\n  Stub / preview banner pattern used by every certified simulator to\n  demo features still in design. Two-tone gold-on-charcoal placard,\n  centered, scale-and-fade transition, 1.2s default dwell.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig() / resolveConfig(model)\n  emitGenericFeatureBannerCSS(cfg)\n  emitGenericFeatureBannerMarkup(cfg)\n  emitGenericFeatureBannerRuntime(cfg)\n\nLifecycle (HookBus contract — listen-only)\n──────────────────────────────────────────\n  Subscribes to: `onForceFeatureRequested`\n  Emits:         (none — pure visual feedback)","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"germanyComplianceGate","category":"uncategorised","description":"W58.J-DE — GlüStV (Glücksspielstaatsvertrag 2021) compliance gate.","file":"src/blocks/germanyComplianceGate.mjs","testFile":"tests/blocks/germanyComplianceGate.test.mjs","loc":344,"exports":["DE_MIN_SPIN_MS_DEFAULT","STATE_CLEAR_PREFIXES","defaultConfig","emitGermanyComplianceGateCSS","emitGermanyComplianceGateRuntime","resolveConfig"],"emittedEvents":["onGameStateCleared","onIndexedDbCleared","onMinSpinPaceEnforced"],"lifecycleHooks":[],"purpose":"","industryRef":"","publicApi":[{"name":"export const STATE_CLEAR_PREFIXES","desc":""},{"name":"export const DE_MIN_SPIN_MS_DEFAULT","desc":""},{"name":"export function defaultConfig(): GermanyComplianceGateConfig","desc":""},{"name":"export function resolveConfig(model?: object): GermanyComplianceGateConfig","desc":""},{"name":"export function emitGermanyComplianceGateCSS(cfg): string  (no-op, returns '')","desc":""},{"name":"export function emitGermanyComplianceGateRuntime(cfg): string","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"grandInterruptionLock","category":"uncategorised","description":"Wave D-17.6 (Foundry-family gap closure) — GRAND interruption-lock +","file":"src/blocks/grandInterruptionLock.mjs","testFile":"tests/blocks/grandInterruptionLock.test.mjs","loc":496,"exports":["defaultConfig","emitGrandInterruptionLockCSS","emitGrandInterruptionLockRuntime","requiresHandpay","resolveConfig","shouldLock"],"emittedEvents":["onGrandLock","onGrandReleased","onHandpayRequested"],"lifecycleHooks":["onFeaturePayout","onHoldAndWinEnd","onPotSymbolCollected"],"purpose":"Provides a vendor-neutral, opt-in lock layer that enforces the\n  GRAND celebration contract published by the Foundry-family GDD\n  §10.5 / §10.6:\n    \"GRAND celebration is interruption-locked: it plays to completion,\n     presents the 1,000,000-credit win, and on the cabinet routes to\n     attendant/jackpot handpay per jurisdiction before crediting.\"\n  The block intercepts the standard interrupt sources (slam-stop,\n  skip, autoplay-stop, quick-spin, MAX-BET) while the celebration is\n  active, then re-enables them when the locked window expires.\n\nIndustry reference (vendor-neutral, industry baseline):\n  Locked-jackpot celebration is the industry-standard gating mechanism\n  for high-cap (≥ 1,000-credit) awards across regulated land-based\n  markets and most jurisdictionally-fenced online RGS deployments.\n  Cabinet-side it is wired to the SAS / G2S protocol; online it is a\n  client-side window-flag contract the back-office hub consumes. The\n  block is the structural generalization of that contract.","industryRef":"","publicApi":[{"name":"export function defaultConfig(): GrandInterruptionLockConfig","desc":""},{"name":"export function resolveConfig(model?: object): GrandInterruptionLockConfig","desc":""},{"name":"export function emitGrandInterruptionLockCSS(cfg): string","desc":""},{"name":"export function emitGrandInterruptionLockRuntime(cfg): string","desc":""},{"name":"export function shouldLock(amount, cfg): boolean         (test-exposed)","desc":""},{"name":"export function requiresHandpay(jurisdiction, cfg): boolean","desc":""},{"name":"Lifecycle (when enabled)","desc":""},{"name":"• onHoldAndWinEnd / onPotSymbolCollected","desc":"read amount → check"},{"name":"threshold","desc":"if locked, set lockActive=true + emit onGrandLock"},{"name":"• Intercept window: __SLOT_GRAND_LOCK_ACTIVE__ flag set; controls","desc":""},{"name":"receive ARIA disabled hint via body[data-grand-lock] attribute.","desc":""},{"name":"• celebrationDurationMs timer","desc":"emit onGrandReleased → clear flag."},{"name":"• If handpay route enabled, emit onHandpayRequested at lock start;","desc":""},{"name":"observable wallets stage the credit until release.","desc":""},{"name":"HookBus events (sole emitter contract)","desc":""},{"name":"• onGrandLock           payload: { award, threshold, jurisdiction }","desc":""},{"name":"• onGrandReleased       payload: { award, durationMs }","desc":""},{"name":"• onHandpayRequested    payload: { award, jurisdiction, attendantHint }","desc":""},{"name":"Force chip (per rule_force_buttons_real_spin)","desc":""},{"name":"• window.grandInterruptionLockForce(award)","desc":""},{"name":"","desc":"sets window.__FORCE_GRAND_AWARD__ = award"},{"name":"","desc":"triggers runOneBaseSpin() (real engine path)"},{"name":"","desc":"engine bakes a synthetic full-board hold-and-win outcome whose"},{"name":"total ≥ cfg.grandThresholdCredits; the block detects + locks","desc":""},{"name":"organically. Force-chip falls back to direct emit when engine","desc":""},{"name":"does not honor the flag.","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"hapticFeedback","category":"uncategorised","description":"player events. Mobile browsers expose `navigator.vibrate`, but misuse","file":"src/blocks/hapticFeedback.mjs","testFile":"tests/blocks/hapticFeedback.test.mjs","loc":201,"exports":["defaultConfig","emitHapticFeedbackRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onBigWinTierEntered","onFsTrigger"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitHapticFeedbackRuntime(cfg)","desc":"runtime JS string"}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"hexClusterEngine","category":"uncategorised","description":"Wave LEGO-ENG.2 — Hex grid + cluster pays evaluator fusion.","file":"src/blocks/hexClusterEngine.mjs","testFile":"tests/blocks/hexClusterEngine.test.mjs","loc":376,"exports":["defaultConfig","emitHexClusterEngineCSS","emitHexClusterEngineRuntime","findHexClusters","resolveConfig"],"emittedEvents":["onHexClusterPay"],"lifecycleHooks":["onSpinResult","onTumbleStep","preSpin"],"purpose":"───────\n  Combines hex-axial grid topology (q,r coordinates) with cluster-\n  pays evaluator (connected matching-symbol groups → award scaled by\n  cluster size). Distinct from existing eval engines:\n\n    • `hexReelEngine.mjs`     — pure hex spin animation (no eval)\n    • `clusterPaysEval.mjs`   — rectangular cluster eval (4-neighbor)\n    • `dynamicWaysEngine.mjs` — variable-rows rectangular eval\n\n  This block does NOT spin reels (hexReelEngine still owns animation);\n  it ONLY scans the settled hex grid and emits cluster-win events\n  using 6-neighbor adjacency rules (hex flat-top / pointy-top\n  neighbour offsets). Award value per cluster derived from cluster\n  size → paytable lookup.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Hex cluster\" pattern combines honeycomb visual aesthetic with\n  connected-group payout evaluation; common on themed slots that\n  want both: visual differentiation + modern cluster pay mechanic.","industryRef":"───────────────────────────────────\n  \"Hex cluster\" pattern combines honeycomb visual aesthetic with\n  connected-group payout evaluation; common on themed slots that\n  want both: visual differentiation + modern cluster pay mechanic.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitHexClusterEngineCSS(cfg)","desc":""},{"name":"emitHexClusterEngineRuntime(cfg, model)","desc":""},{"name":"findHexClusters(cells, minSize, sameSymRule)    (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onSpinResult  (priority 30) — scan grid + emit clusters","desc":""},{"name":"• onTumbleStep  (priority 30) — re-scan after cascade","desc":""},{"name":"• preSpin       (priority 30) — clear last-clusters state","desc":""},{"name":"emits:","desc":""},{"name":"• onHexClusterPay   { clusterSize, cellKeys, awardX, symbol }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"hexReelEngine","category":"engine","description":"Wave J2b — Hex real reel engine.","file":"src/blocks/hexReelEngine.mjs","testFile":"tests/blocks/hexReelEngine.test.mjs","loc":466,"exports":["defaultConfig","emitHexReelEngineCSS","emitHexReelEngineRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"hiLoGamble","category":"feature","description":"Many classic and modern slots offer a post-win double-or-nothing card","file":"src/blocks/hiLoGamble.mjs","testFile":"tests/blocks/hiLoGamble.test.mjs","loc":369,"exports":["defaultConfig","emitHiLoGambleCSS","emitHiLoGambleMarkup","emitHiLoGambleRuntime","resolveConfig"],"emittedEvents":["onHiLoChoice","onHiLoCollected","onHiLoResolved","onHiLoStart"],"lifecycleHooks":["onFsEnd","onFsTrigger","onWinPresentationEnd","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitHiLoGambleCSS(cfg)","desc":""},{"name":"emitHiLoGambleMarkup(cfg)","desc":""},{"name":"emitHiLoGambleRuntime(cfg)","desc":""}],"lifecycle":{"subscribes":["onWinPresentationEnd → if award > 0, reveal GAMBLE CTA chip","preSpin              → hide CTA (round ended), close modal if open","onFsTrigger          → hide CTA during FS (RG: no gamble during FS)"],"emits":["onHiLoStart      { award, source }","onHiLoChoice     { choice: 'higher'|'lower', card, source }","onHiLoResolved   { result: 'win'|'lose', choice, card, nextCard, stake, source }","onHiLoCollected  { stake, rounds, source }","a11y:","- CTA chip: role=\"button\", aria-label, focus-visible outline.","- Modal:    role=\"dialog\", aria-modal=\"true\", aria-labelledby, focus-trap","restoreFocus on close, Escape = COLLECT.","- aria-live=\"polite\" status line announces card + result.","- WCAG 2.5.5 — buttons ≥ 44×44 px touch target.","- prefers-reduced-motion gate disables flip / shake animation."]}},{"name":"historyLog","category":"ui","description":"spin records an entry the player can scrub through after the fact.","file":"src/blocks/historyLog.mjs","testFile":"tests/blocks/historyLog.test.mjs","loc":761,"exports":["HISTORY_MODES","defaultConfig","emitHistoryLogCSS","emitHistoryLogMarkup","emitHistoryLogRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onAutoplayStart","onBalanceChanged","onFsEnd","onFsTrigger","onGambleEnd","postSpin","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitHistoryLogCSS(cfg)","desc":""},{"name":"emitHistoryLogMarkup(cfg)","desc":""},{"name":"emitHistoryLogRuntime(cfg)","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"holdAndWin","category":"feature","description":"Hold & Win / Hold & Spin block — industry-standard lock-and-respin pattern.","file":"src/blocks/holdAndWin.mjs","testFile":"tests/blocks/holdAndWin.test.mjs","loc":2185,"exports":["defaultConfig","emitHoldAndWinCSS","emitHoldAndWinMarkup","emitHoldAndWinRuntime","resolveConfig"],"emittedEvents":["onFeaturePayout","onHoldAndWinEnd","onHoldAndWinPayout","onHoldAndWinPhase","onHoldAndWinTrigger"],"lifecycleHooks":["onForceFeatureRequested","onFsEnd","onFsTrigger","onSkipRequested","onSpinResult","onWildTriggerHoldAndWinRequested","postSpin","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitHoldAndWinCSS(cfg), emitHoldAndWinMarkup(cfg),","desc":""},{"name":"emitHoldAndWinRuntime(cfg)","desc":""},{"name":"Lifecycle (HookBus):","desc":""},{"name":"subscribes: postSpin (detect trigger / respin tick),","desc":""},{"name":"preSpin (clear stale .is-locked-bonus on round end),","desc":""},{"name":"onFsEnd (force-end if still running)","desc":""},{"name":"emits (owned): onHoldAndWinIntro, onHoldAndWinStart, onHoldAndWinOrb,","desc":""},{"name":"onHoldAndWinJackpot, onHoldAndWinFullGrid,","desc":""},{"name":"onHoldAndWinEnd","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"holdAndWinCreditBucket","category":"feature","description":"The \"Credit Bucket\" / \"Cash-On-Reels\" pattern is the universal DNA of","file":"src/blocks/holdAndWinCreditBucket.mjs","testFile":"tests/blocks/holdAndWinCreditBucket.test.mjs","loc":659,"exports":["defaultConfig","emitHoldAndWinCreditBucketCSS","emitHoldAndWinCreditBucketMarkup","emitHoldAndWinCreditBucketRuntime","resolveConfig"],"emittedEvents":["onCreditBucketEnd","onCreditBucketLocked","onCreditBucketRespinStart"],"lifecycleHooks":["onFsEnd","onFsTrigger","onSpinResult","postSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"holdAndWinFrameMultiplier","category":"multiplier","description":"Wave LEGO-HW2 — Frozen Frame Multiplier for Hold & Win respin rounds.","file":"src/blocks/holdAndWinFrameMultiplier.mjs","testFile":"tests/blocks/holdAndWinFrameMultiplier.test.mjs","loc":406,"exports":["defaultConfig","emitHoldAndWinFrameMultiplierCSS","emitHoldAndWinFrameMultiplierMarkup","emitHoldAndWinFrameMultiplierRuntime","resolveConfig","tierBumpForLanding"],"emittedEvents":["onFrameMultiplierBumped","onFrameMultiplierFinal"],"lifecycleHooks":["onHoldAndWinEnd","onHoldAndWinIntro","onHoldAndWinLock","preSpin"],"purpose":"───────\n  In some Hold & Win formats each locked bonus cell carries its OWN\n  persistent FRAME tier (1×/2×/3×/5×/10×…). The tier sticks to the\n  cell across every remaining respin. When ANOTHER bonus orb lands on\n  an already-locked cell, that cell's tier BUMPS up one ladder step.\n  At round-end, the bucket value of each cell is multiplied by its\n  final frame tier — payouts therefore scale with how often a cell\n  gets re-hit during the respin sequence. Distinct from:\n    • multiplierOrb        (per-cell symbol-bound, one-shot)\n    • multiplierLadder     (round-global progressive)\n    • persistentMultiplier (round-global accumulator)\n    • perFsSpinMultiplier  (per-spin rolling, FS-only)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Frame persistence\" pattern — chip rendered in a cell corner,\n  visually distinct from the bucket value, bumps on re-land, persists\n  through every respin until the round closes.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitHoldAndWinFrameMultiplierCSS(cfg)\n  emitHoldAndWinFrameMultiplierMarkup(cfg)\n  emitHoldAndWinFrameMultiplierRuntime(cfg)\n  tierBumpForLanding(currentTier, ladder)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onHoldAndWinIntro  (priority 30) — init FRAME_MULT_STATE\n    • onHoldAndWinLock   (priority 30) — assign tier 1 or bump existing\n    • onHoldAndWinEnd    (priority 30) — compute totalProduct, emit final, clear\n    • preSpin            (priority 30) — defensive clear if stale state survived\n  emits:\n    • onFrameMultiplierBumped { cellId, oldTier, newTier }\n    • onFrameMultiplierFinal  { tiers, totalProduct }","industryRef":"───────────────────────────────────\n  \"Frame persistence\" pattern — chip rendered in a cell corner,\n  visually distinct from the bucket value, bumps on re-land, persists\n  through every respin until the round closes.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitHoldAndWinFrameMultiplierCSS(cfg)\n  emitHoldAndWinFrameMultiplierMarkup(cfg)\n  emitHoldAndWinFrameMultiplierRuntime(cfg)\n  tierBumpForLanding(currentTier, ladder)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onHoldAndWinIntro  (priority 30) — init FRAME_MULT_STATE\n    • onHoldAndWinLock   (priority 30) — assign tier 1 or bump existing\n    • onHoldAndWinEnd    (priority 30) — compute totalProduct, emit final, clear\n    • preSpin            (priority 30) — defensive clear if stale state survived\n  emits:\n    • onFrameMultiplierBumped { cellId, oldTier, newTier }\n    • onFrameMultiplierFinal  { tiers, totalProduct }","publicApi":[],"lifecycle":{"subscribes":["• onHoldAndWinIntro  (priority 30) — init FRAME_MULT_STATE","• onHoldAndWinLock   (priority 30) — assign tier 1 or bump existing","• onHoldAndWinEnd    (priority 30) — compute totalProduct, emit final, clear","• preSpin            (priority 30) — defensive clear if stale state survived"],"emits":["• onFrameMultiplierBumped { cellId, oldTier, newTier }","• onFrameMultiplierFinal  { tiers, totalProduct }"]}},{"name":"holdAndWinLockedOrbMultiplier","category":"multiplier","description":"Wave LEGO-HW-M2 — Locked-orb ×N multiplier tag for Hold & Win respins.","file":"src/blocks/holdAndWinLockedOrbMultiplier.mjs","testFile":"tests/blocks/holdAndWinLockedOrbMultiplier.test.mjs","loc":346,"exports":["aggregateValues","defaultConfig","emitHoldAndWinLockedOrbMultiplierCSS","emitHoldAndWinLockedOrbMultiplierMarkup","emitHoldAndWinLockedOrbMultiplierRuntime","pickMultiplierValue","resolveConfig"],"emittedEvents":["onLockedOrbMultiplierFinal","onLockedOrbMultiplierRolled"],"lifecycleHooks":["onHoldAndWinEnd","onHoldAndWinLock","preSpin"],"purpose":"───────\n  Alternative round-end semantics for Hold & Win where each locked orb\n  carries a NUMERIC MULTIPLIER value (rolled at lock-time) instead of\n  a fixed credit-bucket value. Final round payout is computed as:\n      (base seed bet) × aggregate(allLockedOrbMultValues)\n  where `aggregate` is either SUM (additive) or PRODUCT\n  (multiplicative), driven by GDD knob `aggregation`. Distinct from:\n    • holdAndWinCreditBucket  (credit values, additive sum)\n    • multiplierOrb           (per-cell symbol-bound mult in base game)\n    • persistentMultiplier    (accumulator across FS spins)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Classic \"multiplier orb in lock-and-respin\" format — each locking\n  orb stamps a chip (\"×3\", \"×10\", \"×25\") on its cell; when respins\n  exhaust or grid fills, all chips combine into one payout multiplier\n  on the seed bet.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitHoldAndWinLockedOrbMultiplierCSS(cfg)\n  emitHoldAndWinLockedOrbMultiplierMarkup(cfg)\n  emitHoldAndWinLockedOrbMultiplierRuntime(cfg)\n  pickMultiplierValue(distribution, rng)   (pure helper, exported for tests)\n  aggregateValues(values, mode)            (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onHoldAndWinLock (priority 30) — rolls a mult value for the new\n                                       locked cell, stamps chip\n    • onHoldAndWinEnd  (priority 30) — aggregates, emits final, clears\n    • preSpin          (priority 30) — clears stale state when H&W not\n                                       active\n  emits:\n    • onLockedOrbMultiplierRolled  { cellId, multValue }\n    • onLockedOrbMultiplierFinal   { totalAdditive, totalProduct, count }","industryRef":"───────────────────────────────────\n  Classic \"multiplier orb in lock-and-respin\" format — each locking\n  orb stamps a chip (\"×3\", \"×10\", \"×25\") on its cell; when respins\n  exhaust or grid fills, all chips combine into one payout multiplier\n  on the seed bet.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitHoldAndWinLockedOrbMultiplierCSS(cfg)\n  emitHoldAndWinLockedOrbMultiplierMarkup(cfg)\n  emitHoldAndWinLockedOrbMultiplierRuntime(cfg)\n  pickMultiplierValue(distribution, rng)   (pure helper, exported for tests)\n  aggregateValues(values, mode)            (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onHoldAndWinLock (priority 30) — rolls a mult value for the new\n                                       locked cell, stamps chip\n    • onHoldAndWinEnd  (priority 30) — aggregates, emits final, clears\n    • preSpin          (priority 30) — clears stale state when H&W not\n                                       active\n  emits:\n    • onLockedOrbMultiplierRolled  { cellId, multValue }\n    • onLockedOrbMultiplierFinal   { totalAdditive, totalProduct, count }","publicApi":[],"lifecycle":{"subscribes":["• onHoldAndWinLock (priority 30) — rolls a mult value for the new","locked cell, stamps chip","• onHoldAndWinEnd  (priority 30) — aggregates, emits final, clears","• preSpin          (priority 30) — clears stale state when H&W not","active"],"emits":["• onLockedOrbMultiplierRolled  { cellId, multValue }","• onLockedOrbMultiplierFinal   { totalAdditive, totalProduct, count }"]}},{"name":"holdAndWinReelExpansion","category":"feature","description":"Wave LEGO-HW2.2 — Hold & Win reel expansion (premium tier).","file":"src/blocks/holdAndWinReelExpansion.mjs","testFile":"tests/blocks/holdAndWinReelExpansion.test.mjs","loc":342,"exports":["defaultConfig","emitHoldAndWinReelExpansionCSS","emitHoldAndWinReelExpansionRuntime","resolveConfig","shouldExpand"],"emittedEvents":["onHoldAndWinReelExpanded"],"lifecycleHooks":["onHoldAndWinPhase","onHoldAndWinRespin","postSpin"],"purpose":"───────\n  Mid-round during an active H&W feature, the grid EXPANDS by an\n  extra reel column when a milestone is hit (configurable: after N\n  respins, or after locked-cell percentage threshold). New column\n  is empty initially; subsequent respins populate it via standard\n  H&W mechanics.\n\n  Industry-typical pattern: \"grid expansion\" tier of H&W rounds —\n  raises the maximum achievable payout by adding cells to the lock\n  pool. Player visual feedback: dramatic column-slide-in animation.\n\n  Distinct from existing H&W blocks:\n    • `holdAndWin.mjs`                     — base state machine\n    • `holdAndWinFrameMultiplier.mjs`      — frame mult escalation\n    • `holdAndWinLockedOrbMultiplier.mjs`  — per-orb mult roll\n    • `holdAndWinRoomJackpotMultiplier.mjs`— jackpot room promote\n\n  This block ONLY adds DOM columns + emits the expansion event.\n  It does NOT mutate H&W respin counters or lock state — that\n  stays in `holdAndWin.mjs` (single-owner state machine).\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Grid expansion\" H&W tier seen on multi-tier lock-and-respin\n  slots — typically triggered by player reaching a milestone within\n  the H&W round (75% grid full, every 3 respins, etc.).","industryRef":"───────────────────────────────────\n  \"Grid expansion\" H&W tier seen on multi-tier lock-and-respin\n  slots — typically triggered by player reaching a milestone within\n  the H&W round (75% grid full, every 3 respins, etc.).","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitHoldAndWinReelExpansionCSS(cfg)","desc":""},{"name":"emitHoldAndWinReelExpansionRuntime(cfg, model)","desc":""},{"name":"shouldExpand(respinsUsed, lockedPct, cfg)     (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onHoldAndWinPhase   (priority 32) — reset state on INTRO; cleanup on INACTIVE","desc":""},{"name":"• onRespin            (priority 32) — milestone check (alt name onHoldAndWinRespin)","desc":""},{"name":"• postSpin            (priority 32) — fallback milestone check","desc":""},{"name":"emits:","desc":""},{"name":"• onHoldAndWinReelExpanded   { newColumnCount, trigger, expansionsThisRound }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"holdAndWinRoomJackpotMultiplier","category":"multiplier","description":"Wave LEGO-HW-RJM — Hold & Win Room/Jackpot Multiplier ladder.","file":"src/blocks/holdAndWinRoomJackpotMultiplier.mjs","testFile":"tests/blocks/holdAndWinRoomJackpotMultiplier.test.mjs","loc":358,"exports":["defaultConfig","emitHoldAndWinRoomJackpotMultiplierCSS","emitHoldAndWinRoomJackpotMultiplierMarkup","emitHoldAndWinRoomJackpotMultiplierRuntime","resolveConfig","resolveRoomForCount"],"emittedEvents":["onRoomJackpotFinal","onRoomPromoted"],"lifecycleHooks":["onHoldAndWinEnd","onHoldAndWinIntro","onHoldAndWinLock","preSpin"],"purpose":"───────\n  For Hold & Win (Respin / Lock & Spin) rounds where the player\n  progresses through a ladder of \"rooms\" (MINI → MINOR → MAJOR →\n  GRAND) based on the cumulative number of locked orbs at any point\n  in the round. Each room carries its own jackpot multiplier; the\n  final reached room's multX is applied to the round-end bucket\n  payout. Distinct from:\n    • multiplierLadder (single counter, generic spin progression)\n    • multiplierOrb (per-cell symbol-bound multiplier)\n    • persistentMultiplier (FS-scope accumulator, never resets)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Classic \"room jackpot ladder\" Hold & Win format — a HUD chip\n  tracks the current room tier, promotes upward as the locked-orb\n  count crosses each threshold, and the reached tier's multiplier\n  resolves once the round ends.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitHoldAndWinRoomJackpotMultiplierCSS(cfg)\n  emitHoldAndWinRoomJackpotMultiplierMarkup(cfg)\n  emitHoldAndWinRoomJackpotMultiplierRuntime(cfg)\n  resolveRoomForCount(rooms, lockedCount)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onHoldAndWinIntro (priority 30) — init ROOM_STATE to first room\n    • onHoldAndWinLock  (priority 30) — re-evaluate room, promote if threshold crossed\n    • onHoldAndWinEnd   (priority 30) — emit final room multiplier outcome\n    • preSpin           (priority 30) — clear chip if H&W not active\n  emits:\n    • onRoomPromoted        { oldRoom, newRoom }\n    • onRoomJackpotFinal    { room, multX, lockedCount }","industryRef":"───────────────────────────────────\n  Classic \"room jackpot ladder\" Hold & Win format — a HUD chip\n  tracks the current room tier, promotes upward as the locked-orb\n  count crosses each threshold, and the reached tier's multiplier\n  resolves once the round ends.\n\nPublic API (server-side, ES module)\n─────── olFs","category":"uncategorised","description":"Wave LEGO-FSV.2 — Free Spins start with N symbols already locked.","file":"src/blocks/lockedSymbolFs.mjs","testFile":"tests/blocks/lockedSymbolFs.test.mjs","loc":282,"exports":["defaultConfig","emitLockedSymbolFsCSS","emitLockedSymbolFsRuntime","pickRandomCells","resolveConfig"],"emittedEvents":["onLockedSymbolFsSeeded"],"lifecycleHooks":["onFsEnd","onFsTrigger","postSpin","preSpin"],"purpose":"───────\n  On FS_INTRO (before the first FS spin actually rolls), this block\n  plants N \"locked\" symbol cells on the grid. The lock persists for\n  the entire FS round — each subsequent FS spin only re-spins the\n  unlocked cells, while locked cells contribute to every payout.\n\n  Industry pattern: gives the player a guaranteed boost from the\n  first FS spin without needing to land scatters/bonus symbols\n  inside FS to maintain win velocity.\n\n  Distinct from existing locked-cell blocks:\n    • `stickyWild.mjs`        — single sticky wild per spin\n    • `holdAndWin.mjs`        — full lock-and-respin feature\n    • `respin.mjs`            — single-cell hold respin\n\n  This block is FS-CONTEXT ONLY and is the boot-time seeding layer.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Pre-locked FS\" pattern present on many free-spin-rich slots:\n  round opens with N high-value or wild symbols already pinned in\n  place. Industry typical: 2–4 locked cells, random reel/row picks.","industryRef":"───────────────────────────────────\n  \"Pre-locked FS\" pattern present on many free-spin-rich slots:\n  round opens with N high-value or wild symbols already pinned in\n  place. Industry typical: 2–4 locked cells, random reel/row picks.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitLockedSymbolFsCSS(cfg)","desc":""},{"name":"emitLockedSymbolFsRuntime(cfg, model)","desc":""},{"name":"pickRandomCells(rows, cols, count, rng)   (pure  In-spin Mystery Prize Box.","file":"src/blocks/mysteryPrizeBox.mjs","testFile":"tests/blocks/mysteryPrizeBox.test.mjs","loc":395,"exports":["defaultConfig","emitMysteryPrizeBoxCSS","emitMysteryPrizeBoxMarkup","emitMysteryPrizeBoxRuntime","resolveConfig"],"emittedEvents":["onMysteryPrizeBoxAppeared","onMysteryPrizeBoxDismissed","onMysteryPrizeBoxOpened"],"lifecycleHooks":["onFsEnd","onFsTrigger","postSpin"],"purpose":"When GDD declares `mystery_prize_box`, this block randomly drops a\n  \"treasure chest\" overlay during a spin (probability-gated per\n  spin), the player taps it, and it reveals one of a configured\n  prize tier set (e.g. credit award · scatter plant · multiplier\n  bump · free-spins trigger). The visual surface + control is\n  complete here; the math wiring (actual award payout) lands with\n  the PAR hot-swap in Phase 2 (placeholder credit shown until then).\n\nIndustry-reference (vendor-neutral):\n  Random in-spin treasure / prize / chest overlays are a 2024-2026\n  industry-standard delight pattern — used as a \"consolation prize\"\n  on losing spins to soften LDW (Losing Disguised as Win) regulatory\n  pressure, OR as a stacking bonus path on top of any spin outcome.\n  Tier count of 3-6 (Small / Medium / Large / Bonus) is the modal\n  landscape pattern.","industryRef":"Random in-spin treasure / prize / chest overlays are a 2024-2026\n  industry-standard delight pattern — used as a \"consolation prize\"\n  on losing spins to soften LDW (Losing Disguised as Win) regulatory\n  pressure, OR as a stacking bonus path on top of any spin outcome.\n  Tier count of 3-6 (Small / Medium / Large / Bonus) is the modal\n  landscape pattern.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitMysteryPrizeBoxCSS(cfg)","desc":"CSS string (chest + reveal overlay)"},{"name":"emitMysteryPrizeBoxMarkup(cfg)","desc":"HTML string (chest host)"},{"name":"emitMysteryPrizeBoxRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  postSpin (RNG dice on whether to drop the box this spin)","desc":""},{"name":"onFsTrigger (suppress mid-bonus — no nested random)","desc":""},{"name":"onFsEnd     (re-enable post-bonus)","desc":""},{"name":"emits:       onMysteryPrizeBoxAppeared { tierCount }","desc":""},{"name":"onMysteryPrizeBoxOpened   { tierId, awardKind, awardValue }","desc":""},{"name":"onMysteryPrizeBoxDismissed { reason }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• Chest button: real <button> with role=\"button\" + aria-label","desc":""},{"name":"\"Mystery prize — tap to open\" + visible focus ring.","desc":""},{"name":"• Reveal overlay uses role=\"alertdialog\" + aria-live=\"assertive\".","desc":""},{"name":"• Esc key dismisses (treated as picking nothing). Auto-dismiss","desc":""},{"name":"after `autoDismissMs` if untouched (default 4000ms).","desc":""},{"name":"• Tokens hoisted (0 magic numbers); honors prefers-reduced-motion","desc":""},{"name":"(drop animation collapses to instant appearance).","desc":""},{"name":"• Rate-limit: max one box per N spins (default 1 per 5) so the","desc":""},{"name":"surface stays scarce.","desc":""},{"name":"• Self-disable mid-FS to avoid stacking with FS celebration.","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["postSpin (RNG dice on whether to drop the box this spin)","onFsTrigger (suppress mid-bonus — no nested random)","onFsEnd     (re-enable post-bonus)"],"emits":["onMysteryPrizeBoxAppeared { tierCount }","onMysteryPrizeBoxOpened   { tierId, awardKind, awardValue }","onMysteryPrizeBoxDismissed { reason }","a11y / perf:","• Chest button: real <button> with role=\"button\" + aria-label","\"Mystery prize — tap to open\" + visible focus ring.","• Reveal overlay uses role=\"alertdialog\" + aria-live=\"assertive\".","• Esc key dismisses (treated as picking nothing). Auto-dismiss","after `autoDismissMs` if untouched (default 4000ms).","• Tokens hoisted (0 magic numbers); honors prefers-reduced-motion","(drop animation collapses to instant appearance).","• Rate-limit: max one box per N spins (default 1 per 5) so the","surface stays scarce.","• Self-disable mid-FS to avoid stacking with FS celebration.","/"]}},{"name":"mysteryReveal","category":"uncategorised","description":"Wave W47.S19 — B65 · mysteryReveal block.","file":"src/blocks/mysteryReveal.mjs","testFile":"tests/blocks/mysteryReveal.test.mjs","loc":329,"exports":["defaultConfig","emitMysteryRevealCSS","emitMysteryRevealMarkup","emitMysteryRevealRuntime","resolveConfig"],"emittedEvents":["onMysteryRevealEnd","onMysteryRevealStart"],"lifecycleHooks":["onSpinResult"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig()","desc":"safe defaults"},{"name":"resolveConfig(model)","desc":"merge + clamp"},{"name":"emitMysteryRevealCSS(cfg)","desc":"CSS string"},{"name":"emitMysteryRevealMarkup(cfg)","desc":"HTML string"},{"name":"emitMysteryRevealRuntime(cfg)","desc":"IIFE runtime"},{"name":"Lifecycle (Runtime):","desc":""},{"name":"listens : onSpinResult — inspects window.__MYSTERY_REVEAL__ (set by","desc":""},{"name":"mysterySymbol) for the picked symbol id + cell count.","desc":""},{"name":"emits   : onMysteryRevealStart { symbol, count, source }","desc":""},{"name":"onMysteryRevealEnd   { symbol, count, reason }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"mysterySymbol","category":"wild","description":"Mystery cells appear with a \"?\" face, then transform into ONE picked","file":"src/blocks/mysterySymbol.mjs","testFile":"tests/blocks/mysterySymbol.test.mjs","loc":276,"exports":["defaultConfig","emitMysterySymbolCSS","emitMysterySymbolRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onFsEnd","onSpinResult","preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"mysterySymbolMultiplier","category":"wild","description":"Wave LEGO-M2 — Mystery symbol reveals as a multiplier value.","file":"src/blocks/mysterySymbolMultiplier.mjs","testFile":"tests/blocks/mysterySymbolMultiplier.test.mjs","loc":242,"exports":["defaultConfig","emitMysterySymbolMultiplierCSS","emitMysterySymbolMultiplierRuntime","pickMysteryMultValue","resolveConfig"],"emittedEvents":["onMysteryMultiplierRevealed"],"lifecycleHooks":["onSpinResult","onTumbleStep","preSpin"],"purpose":"───────\n  Distinct from `mysterySymbol.mjs` (which reveals a random PAY symbol)\n  and `multiplierOrb.mjs` (which IS the multiplier-bearing symbol).\n\n  This block fires when the mystery symbol reveals NOT into a regular\n  pay symbol but into a MULTIPLIER VALUE (× N) that applies to the\n  final chain payout. Industry pattern: \"?\"/MYST symbol lands → reveal\n  animation flips it → reveals ×N chip on the cell → multiplier feeds\n  into the total mult HUD via HookBus.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Mystery multiplier\" variant of mystery-reveal feature found on\n  cascade + ways slots. Reveal probability and value distribution\n  are GDD-driven; this block is the PRESENTATION + state hook.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitMysterySymbolMultiplierCSS(cfg)\n  emitMysterySymbolMultiplierRuntime(cfg, model)\n  pickMysteryMultValue(distribution, rng)   (pure helper)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onSpinResult   (priority 25) — scan for mystery symbols, decide reveal\n    • onTumbleStep   (priority 25) — same for cascade re-evaluation\n    • preSpin        (priority 25) — clear any leftover chip from last spin\n  emits:\n    • onMysteryMultiplierRevealed   { cellKey, multX }","industryRef":"───────────────────────────────────\n  \"Mystery multiplier\" variant of mystery-reveal feature found on\n  cascade + ways slots. Reveal probability and value distribution\n  are GDD-driven; this block is the PRESENTATION + state hook.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitMysterySymbolMultiplierCSS(cfg)\n  emitMysterySymbolMultiplierRuntime(cfg, model)\n  pickMysteryMultValue(distribution, rng)   (pure helper)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onSpinResult   (priority 25) — scan for mystery symbols, decide reveal\n    • onTumbleStep   (priority 25) — same for cascade re-evaluation\n    • preSpin        (priority 25) — clear any leftover chip from last spin\n  emits:\n    • onMysteryMultiplierRevealed   { cellKey, multX }","publicApi":[],"lifecycle":{"subscribes":["• onSpinResult   (priority 25) — scan for mystery symbols, decide reveal","• onTumbleStep   (priority 25) — same for cascade re-evaluation","• preSpin        (priority 25) — clear any leftover chip from last spin"],"emits":["• onMysteryMultiplierRevealed   { cellKey, multX }"]}},{"name":"mysteryWildReveal","category":"wild","description":"Wave LEGO-W2.2 — Mystery symbol reveals as WILD.","file":"src/blocks/mysteryWildReveal.mjs","testFile":"tests/blocks/mysteryWildReveal.test.mjs","loc":253,"exports":["defaultConfig","emitMysteryWildRevealCSS","emitMysteryWildRevealRuntime","resolveConfig","shouldRevealAsWild"],"emittedEvents":["onMysteryWildRevealed"],"lifecycleHooks":["onSpinResult","onTumbleStep","preSpin"],"purpose":"───────\n  Mystery \"?\" symbol on the grid is revealed not as a pay symbol but\n  as the WILD symbol. Industry pattern that gives the player a\n  guaranteed contribution to chain wins from any cell that survived\n  to reveal phase. Distinct from:\n\n    • `mysterySymbol.mjs`            — reveals as a random PAY symbol\n    • `mysterySymbolMultiplier.mjs`  — reveals as a ×N multiplier value\n    • `mysteryReveal.mjs`            — generic mystery flip animation\n\n  This block converts the mystery cell directly to the configured\n  wild symbol id (`W` by default) and emits a single canonical event\n  per reveal so downstream listeners (wildCollisionMultiplier,\n  cascadingWildPersistence, winPresentation) can react.\n\n  The revealed cell is fully wild for evaluation purposes — engine\n  reads `data-symbol` after this block runs.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Mystery wild\" variant of mystery-reveal feature; player tap +\n  reveal animation (flip / pulse) lands on a wild glyph. Probability\n  and timing are GDD-driven; this block is the PRESENTATION + state\n  hook.","industryRef":"───────────────────────────────────\n  \"Mystery wild\" variant of mystery-reveal feature; player tap +\n  reveal animation (flip / pulse) lands on a wild glyph. Probability\n  and timing are GDD-driven; this block is the PRESENTATION + state\n  hook.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitMysteryWildRevealCSS(cfg)","desc":""},{"name":"emitMysteryWildRevealRuntime(cfg, model)","desc":""},{"name":"shouldRevealAsWild(rng, revealProbability)   (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onSpinResult   (priority 26) — scan + reveal","desc":""},{"name":"• onTumbleStep   (priority 26) — same for cascade re-evaluation","desc":""},{"name":"• preSpin        (priority 26) — clear last reveals","desc":""},{"name":"emits:","desc":""},{"name":"• onMysteryWildRevealed   { cellKey, wildSymbolId }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"nearMissTease","category":"uncategorised","description":"When a high-value combination falls one cell short (e.g. 2 scatter on","file":"src/blocks/nearMissTease.mjs","testFile":"tests/blocks/nearMissTease.test.mjs","loc":171,"exports":["defaultConfig","emitNearMissTeaseCSS","emitNearMissTeaseMarkup","emitNear 2/3) — Random palette roulette (per session).","file":"src/blocks/paletteRoulette.mjs","testFile":"tests/blocks/paletteRoulette.test.mjs","loc":246,"exports":["defaultConfig","emitPaletteRouletteCSS","emitPaletteRouletteMarkup","emitPaletteRouletteRuntime","resolveConfig"],"emittedEvents":["onPaletteRolled"],"lifecycleHooks":["onThemeChanged"],"purpose":"On page load, randomly picks one of N configured color palettes\n  (weighted) and applies it via CSS custom properties on\n  `document.documentElement`. Adds visual variety across sessions\n  without changing core game mechanics. Player can re-roll via a\n  small \"↻\" button next to the theme picker.\n\nIndustry-reference (vendor-neutral):\n  Session-randomized palettes are an emerging 2024-2026 retention\n  pattern — gives players a \"new look every session\" feel without\n  changing the game itself. Industry baseline: 3-8 palettes, equal\n  weights, re-roll on demand. Distinct from themePicker (which is\n  semantic light/dark) — palette is purely aesthetic accent color.","industryRef":"Session-randomized palettes are an emerging 2024-2026 retention\n  pattern — gives players a \"new look every session\" feel without\n  changing the game itself. Industry baseline: 3-8 palettes, equal\n  weights, re-roll on demand. Distinct from themePicker (which is\n  semantic light/dark) — palette is purely aesthetic accent color.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitPaletteRouletteCSS(cfg)","desc":"CSS string"},{"name":"emitPaletteRouletteMarkup(cfg)","desc":"HTML string"},{"name":"emitPaletteRouletteRuntime(cfg)","desc":"runtime JS string"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onThemeChanged — re-apply palette over new theme","desc":""},{"name":"emits:       onPaletteRolled { paletteId, paletteIndex }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• Re-roll button: ted total\n    • Out-of-rolls AND no extra-roll modifiers left → award total\n\n  Industry-typical pattern: \"monopoly-style\" or \"snake-and-ladder\"\n  bonus screen alternatives to FS, board-game-aesthetic bonus.\n\n  Distinct from existing bonus pick blocks (matchThreeBonusReveal,\n  moneyGrabGrid) — those are pick-and-reveal; this is\n  positional-traversal with a dice/roll mechanic.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Board-game bonus: player advances along path by rolling dice,\n  collects from tiles, terminates on FINISH. Animation: tile-by-tile\n  step traversal with player token.","industryRef":"───────────────────────────────────\n  Board-game bonus: player advances along path by rolling dice,\n  collects from tiles, terminates on FINISH. Animation: tile-by-tile\n  step traversal with player token.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitPathBonusEngineCSS(cfg)","desc":""},{"name":"emitPathBonusEngineMarkup(cfg)","desc":""},{"name":"emitPathBonusEngineRuntime(cfg, model)","desc":""},{"name":"rollDice(maxRoll, rng)              (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onPathBonusRequested  (priority 35) — mount overlay","desc":""},{"name":"• onFsEnd                (priority 35) — defensive cleanup","desc":""},{"name":"emits:","desc":""},{"name":"• onPathBonusEntered     { tileCount, startRolls }","desc":""},{"name":"• onPathBonusRolled      { roll, fromTile, toTile, tileValue, rollsRemaining }","desc":""},{"name":"• onPathBonusEnded       { reason, awardX, finalTile, rollsUsed }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"patternWin","category":"uncategorised","description":"Wave D-17.1 (Foundry-family gap closure) — Pattern-Win block. Detects a","file":"src/blocks/patternWin.mjs","testFile":"tests/blocks/patternWin.test.mjs","loc":581,"exports":["defaultConfig","detectPattern","emitPatternWinCSS","emitPatternWinRuntime","resolveConfig"],"emittedEvents":["onPatternWinPaid","onPatternWinTrigger"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onSpinResult","postSpin"],"purpose":"Provides a vendor-neutral, math-blind, opt-in detector for a single\n  board pattern whose award REPLACES (not stacks on top of) the\n  underlying line evaluation. The block scans `spinResult.grid` for\n  the configured anchor stack + winning-Wild template; on detection it\n  emits the canonical pattern-win events and renders a one-shot\n  celebration marquee. Award calculation itself is owned by the math\n  layer (per rule_no_math_unless_asked) — the block only signals.\n\nIndustry reference (vendor-neutral, industry baseline):\n  The \"stacked anchor symbol on reel 1 + expanded Wilds reels 2–N →\n  flat multiplier\" pattern is a long-standing industry baseline (see\n  §05.3 + §07 of the Foundry-family production GDD captured at\n  ~/Desktop/ (volcano-themed reference brief). Different titles label\n  it \"pattern win\" or \"full-screen hit\" but the structural rule is the\n  same: anchor stack lights the leftmost reel, expanded Wilds fill\n  contributing reels, the canonical award supersedes the line tally\n  that would otherwise add 5 separate line wins. This block is the\n  structural generalization, not a clone of any one product.\n\nReplace-not-stack semantics\n  GDD edge case (Foundry §05.3 / §07): \"the 1000× pattern award is the\n  canonical evaluation of these <anchor>/Wild lines, not an addition\n  on top of them. Suppress overlapping line-win counters and play one\n  consolidated banner.\" The block emits `onPatternWinTrigger` and the\n  payout-eval chain (out of scope here) is responsible for overriding\n  the line tally via `spinResult.patternWinPayX` (provided by the\n  engine) or via the block's `setMultMax(payX)` HookBus signal when\n  the math layer opts into the simpler \"treat pattern award as max\n  multiplier\" reconciliation. Default behaviour: setMultMax + suppress\n  line tally via `onPatternWinTrigger.replaceLineTally = true`.","industryRef":"","publicApi":[{"name":"export function defaultConfig(): PatternWinConfig","desc":""},{"name":"export function resolveConfig(model?: object): PatternWinConfig","desc":""},{"name":"export function emitPatternWinCSS(cfg): string","desc":""},{"name":"export function emitPatternWinRuntime(cfg): string","desc":""},{"name":"export function detectPattern(grid, cfg): { hit, anchor, winReels } (test-only)","desc":""},{"name":"Lifecycle (when enabled)","desc":""},{"name":"• onSpinResult","desc":"scan grid → if pattern detected, set pending flag +"},{"name":"emit onPatternWinTrigger + setMultMax(payX)","desc":""},{"name":"• postSpin","desc":"render celebration overlay + emit onPatternWinPaid"},{"name":"• onFsSpinResult","desc":"identical scan inside FS round (same emit path)"},{"name":"HookBus events (sole emitter contract)","desc":""},{"name":"• onPatternWinTrigger   payload: { anchor, winReels, payX, replaceLineTally }","desc":""},{"name":"• onPatternWinPaid      payload: { awardCredits, payX, source }","desc":""},{"name":"Force chip (per rule_force_buttons_real_spin)","desc":""},{"name":"• window.patternWinForceAt()","desc":""},{"name":"","desc":"sets window.__FORCE_PATTERN_WIN__ = true"},{"name":"","desc":"triggers runOneBaseSpin() (routes through real engine path)"},{"name":"","desc":"engine bakes synthetic grid satisfying the configured anchor +"},{"name":"win-reel template into spinResult.grid for this spin, so the","desc":""},{"name":"detector flips PASS organically. If the engine does not honor","desc":""},{"name":"the flag, the block falls back to in-handler synthesis of the","desc":""},{"name":"payload (anchor + winReels echoed from cfg) so the celebration","desc":""},{"name":"always renders — the force chip is a QA aid, not the canonical","desc":""},{"name":"payout path.","desc":""}],"lifecycl cation —\n  the player must be able to inspect the math BEFORE wagering.\n  Real-cash payouts compose with betSelector: when bet changes, the\n  \"X PER LINE @ €Y\" column refreshes automatically (no math here —\n  pure display of `payout × bet` formatted as currency).\n\nIndustry-reference (vendor-neutral):\n  The \"info / paytable / help\" pane is an industry baseline expectation\n  shared across all certified slot vendors and required by every Tier-1\n  regulator. This block is the vendor-neutral generalization captured as\n  a reference baseline; no specific vendor styling is implied.","industryRef":"The \"info / paytable / help\" pane is an industry baseline expectation\n  shared across all certified slot vendors and required by every Tier-1\n  regulator. This block is the vendor-neutral generalization captured as\n  a reference baseline; no specific vendor styling is implied.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitPaytableCSS(cfg)","desc":"CSS string (modal + chip styles)"},{"name":"emitPaytableMarkup(cfg, model)","desc":"HTML string (chip + modal scaffold)"},{"name":"emitPaytableRuntime(cfg, model)","desc":"runtime JS string for orchestrator"},{"name":"Runtime contract (after emitted JS executes):","desc":""},{"name":"paytableShow() / paytableHide() / paytableToggle() / paytableIsOpen()","desc":""},{"name":"PAYTABLE_STATE on window","desc":""},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onBetChanged","desc":"refresh real-cash column if open"},{"name":"preSpin","desc":"auto-hide if open"},{"name":"onFsTrigger","desc":"auto-hide (FS overlay owns the screen)"},{"name":"onAutoplayStart","desc":"auto-hide (autoplay session takes over)"},{"name":"emits:       — (none — player-driven UI pane only)","desc":""}],"lifecycle":{"subscribes":["onBetChanged    → refresh real-cash column if open","preSpin         → auto-hide if nPerFsSpinMultiplierRolled   { multX, fsRemain }","industryRef":"───────────────────────────────────\n  Classic \"rolling multiplier\" Free Spins format — value chip flashes\n  above the reels at FS_PLAY start, applies to that spin's win, then\n  re-rolls on the next FS spin.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitPerFsSpinMultiplierCSS(cfg)\n  emitPerFsSpinMultiplierMarkup(cfg, model)\n  emitPerFsSpinMultiplierRuntime(cfg, model)\n  pickValueFromDistribution(distribution, rng)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsSpinResult (priority 30) — draws this spin's mult, paints chip\n    • onFsEnd        (priority 30) — clears chip + state\n  emits:\n    • onPerFsSpinMultiplierRolled   { multX, fsRemain }","publicApi":[],"lifecycle":{"subscribes":["• onFsSpinResult (priority 30) — draws this spin's mult, paints chip","• onFsEnd        (priority 30) — clears chip + state"],"emits":["• onPerFsSpinMultiplierRolled   { multX, fsRemain }"]}},{"name":"persistentMultiplier","category":"multiplier","description":"Multiplier that does NOT reset between spins inside a round (typically","file":"src/blocks/persistentMultiplier.mjs","testFile":"tests/blocks/persistentMultiplier.test.mjs","loc":261,"exports":["defaultConfig","emitPersistentMultiplierCSS","emitPersistentMultiplierMarkup","emitPersistentMultiplierRuntime","resolveConfig"],"emittedEvents":["onMultChange"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onFsTrigger","onTumbleStep","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitPersistentMultiplierCSS(cfg), emitPersistentMultiplierMarkup(cfg),","desc":""},{"name":"emitPersistentMultiplierRuntime(cfg)","desc":""},{"name":"Lifecycle (HookBus):","desc":""},{"name":"subscribes: onSpinResult / onTumbleStep (grow per win),","desc":""}
