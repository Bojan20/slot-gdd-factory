litySetConfig","desc":""},{"name":"export function resolveConfig(model?: object): VolatilitySetConfig","desc":""},{"name":"export function emitPerTriggerVolatilitySetCSS(cfg): string","desc":""},{"name":"export function emitPerTriggerVolatilitySetRuntime(cfg): string","desc":""},{"name":"export function normalizeTier(raw, allowedTiers): string|null  (test)","desc":""},{"name":"Lifecycle (when enabled)","desc":""},{"name":"• onHoldAndWinTrigger","desc":"read result.volatilityTier from event"},{"name":"payload OR window.__VOLATILITY_TIER__","desc":""},{"name":"flag; normalize, lock, emit locked","desc":""},{"name":"• onHoldAndWinEnd / onFsEnd","desc":"emit expired, clear locked state"},{"name":"• Mid-feature re-roll requests are IGNORED by design (locked-on-trigger","desc":""},{"name":"is the canonical contract).","desc":""},{"name":"HookBus events (sole emitter contract)","desc":""},{"name":"• onVolatilitySetLocked     payload: { tier, weights, source }","desc":""},{"name":"• onVolatilitySetExpired    payload: { tier, reason }","desc":""},{"name":"Force chip (per rule_force_buttons_real_spin)","desc":""},{"name":"• window.perTriggerVolatilitySetForce(tier)","desc":""},{"name":"","desc":"sets window.__FORCE_VOLATILITY_TIER__ = tier"},{"name":"","desc":"triggers runOneBaseSpin() (real engine path)"},{"name":"","desc":"engine reads the flag at trigger time and bakes the tier into"},{"name":"its onHoldAndWinTrigger payload; the block detects + locks","desc":""},{"name":"organically. If the engine ignores the flag, the runtime","desc":""},{"name":"falls back to direct lock so the QA chip stays visually","desc":""},{"name":"truthful — never a payout shortcut.","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"pickBonusReveal","category":"uncategorised","description":"Wave W47.S16 — B71 · pickBonusReveal block.","file":"src/blocks/pickBonusReveal.mjs","testFile":"tests/blocks/pickBonusReveal.test.mjs","loc":311,"exports":["defaultConfig","emitPickBonusRevealCSS","emitPickBonusRevealMarkup","emitPickBonusRevealRuntime","resolveConfig"],"emittedEvents":["onPickRevealEnd","onPickRevealStart"],"lifecycleHooks":["onBonusPickResolved","onFsTrigger","onWheelAwardCollected"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig()","desc":"safe defaults (isolated copy)"},{"name":"resolveConfig(model)","desc":"merge + clamp"},{"name":"emitPickBonusRevealCSS(cfg)","desc":"CSS string"},{"name":"emitPickBonusRevealMarkup(cfg)","desc":"HTML string"},{"name":"emitPickBonusRevealRuntime(cfg)","desc":"IIFE runtime"},{"name":"Lifecycle (Runtime):","desc":""},{"name":"listens : exactly one of the three triggerEvent options","desc":""},{"name":"(build-time dead-branch elimination)","desc":""},{"name":"emits   : onPickRevealStart, onPickRevealEnd","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"pickYourFs","category":"uncategorised","description":"Wave LEGO-FSV.1 — Pick-Your-Free-Spins mode selector.","file":"src/blocks/pickYourFs.mjs","testFile":"tests/blocks/pickYourFs.test.mjs","loc":364,"exports":["defaultConfig","emitPickYourFsCSS","emitPickYourFsMarkup","emitPickYourFsRuntime","resolveConfig"],"emittedEvents":["onFsModePicked"],"lifecycleHooks":["onFsEnd","onFsTrigger"],"purpose":"───────\n  On FS trigger, present the player with N (typically 3) selectable\n  FS variants — e.g.:\n    A) 8 spins · ×5 mult     (high volatility, low duration)\n    B) 12 spins · ×2 mult    (balanced)\n    C) 20 spins · ×1 mult    (low volatility, long duration)\n\n  Player taps one card → that mode locks → FS starts with the chosen\n  spinsCount + baseMultiplier. Industry-typical pre-FS choice screen.\n\n  Distinct from existing FS blocks:\n    • `freeSpins.mjs`           — base FS state machine (single mode)\n    • `superchargedFs.mjs`      — FS retrigger × tier escalation\n    • `progressiveFreeSpins.mjs` — progressive mult during FS\n    • `perFsSpinMultiplier.mjs` — random ×N each FS spin\n\n  This block ONLY drives the pre-FS choice overlay + emits the pick;\n  downstream FS blocks consume the chosen spinsCount / baseMultiplier.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Pick your free spins\" pattern is a staple of modern bonus-rich\n  slots. The choice screen sits between scatter celebration and\n  FS_INTRO. Card animation, 44×44 touch targets, role=button per card.","industryRef":"───────────────────────────────────\n  \"Pick your free spins\" pattern is a staple of modern bonus-rich\n  slots. The choice screen sits between scatter celebration and\n  FS_INTRO. Card animation, 44×44 touch targets, role=button per card.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitPickYourFsCSS(cfg)","desc":""},{"name":"emitPickYourFsMarkup(cfg, model)","desc":""},{"name":"emitPickYourFsRuntime(cfg, model)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onFsTrigger (priority 35) — mount choice overlay BEFORE FS_INTRO","desc":""},{"name":"• onFsEnd     (priority 35) — clear last selection state","desc":""},{"name":"emits:","desc":""},{"name":"• onFsModePicked   { modeIndex, spinsCount, baseMultiplier, label }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"playerXp","category":"uncategorised","description":"Wave LEGO-PROG (DEF1 · 1/3) — XP accumulator + session levels.","file":"src/blocks/playerXp.mjs","testFile":"tests/blocks/playerXp.test.mjs","loc":252,"exports":["defaultConfig","emitPlayerXpCSS","emitPlayerXpMarkup","emitPlayerXpRuntime","resolveConfig"],"emittedEvents":["onPlayerLevelUp","onPlayerXpGained"],"lifecycleHooks":["onCoinCollected","onFsEnd","onFsTrigger","onSpinResult"],"purpose":"Awards XP per spin (proportional to bet units) and per coin\n  collected (from coinCollect.mjs). Tracks current level via\n  configurable threshold curve. Exposes shared state on\n  `window.__PLAYER_XP__` so sibling visualization blocks\n  (sessionLevelMeter.mjs) and reward blocks (achievementToast.mjs)\n  can subscribe / render without duplicating tally logic.\n\n  When math layer (Phase 2) lands, the XP-per-bet ratio becomes a\n  real PAR-tuned knob — for now it's a placeholder linear curve.\n\nIndustry-reference (vendor-neutral):\n  Session-XP + level system is a 2024-2026 industry-standard\n  retention mechanic. Default level curve uses ascending thresholds\n  (e.g. 100 / 250 / 500 / 1000) and per-level rewards (free spins,\n  bet boosters, exclusive sessions). PAR layer balances reward\n  value vs trigger frequency to keep RTP target intact.","industryRef":"Session-XP + level system is a 2024-2026 industry-standard\n  retention mechanic. Default level curve uses ascending thresholds\n  (e.g. 100 / 250 / 500 / 1000) and per-level rewards (free spins,\n  bet boosters, exclusive sessions). PAR layer balances reward\n  value vs trigger frequency to keep RTP target intact.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitPlayerXpCSS(cfg)","desc":"CSS string (sr-only live region)"},{"name":"emitPlayerXpMarkup(cfg)","desc":"HTML string (live region host)"},{"name":"emitPlayerXpRuntime(cfg)","desc":"runtime JS string"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onSpinResult     — base XP per spin","desc":""},{"name":"onCoinCollected  — bonus XP per coin","desc":""},{"name":"onFsTrigger      — flag suspend (configurable)","desc":""},{"name":"onFsEnd          — flag resume","desc":""},{"name":"emits:       onPlayerXpGained   { delta, total, source }","desc":""},{"name":"onPlayerLevelUp    { newLevel, prevLevel, reward }","desc":""}],"lifecycle":{"subscribes":["onSpinResult     — base XP per spin","onCoinCollected  — bonus XP per coin","onFsTrigger      — flag suspend (configurable)","onFsEnd          — flag resume"],"emits":["onPlayerXpGained   { delta, total, source }","onPlayerLevelUp    { newLevel, prevLevel, reward }"]}},{"name":"plinkoSpinEngine","category":"engine","description":"────────────────────────────","file":"src/blocks/plinkoSpinEngine.mjs","testFile":"tests/blocks/plinkoSpinEngine.test.mjs","loc":266,"exports":["defaultConfig","emitPlinkoSpinEngineCSS","emitPlinkoSpinEngineRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitPlinkoSpinEngineCSS(cfg)","desc":""},{"name":"emitPlinkoSpinEngineRuntime(cfg)","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"postSpin","category":"engine","description":"Slot GDD Factory · postSpin BLOCK","file":"src/blocks/postSpin.mjs","testFile":"tests/blocks/postSpin.test.mjs","loc":318,"exports":["defaultConfig","emitPostSpinRuntime","resolveConfig"],"emittedEvents":["postSpin"],"lifecycleHooks":["postSpin","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitPostSpinRuntime(cfg)","desc":"runtime JS string"},{"name":"Runtime dependencies: FREESPINS, FSM, FORCE_TRIGGER, devFsBtn, spinButton,","desc":""},{"name":"applyWinHighlight, clearWinHighlight, playScatterCelebration,","desc":""},{"name":"FSM_enterIntro, FSM_runNextFsSpin, FSM_handleRetrigger, FSM_enterOutro,","desc":""},{"name":"FSM_renderHud, countTriggerSymbols, spinsForCount.","desc":""},{"name":"Wave Legacy · industry baseline (vendor-neutral). Original block predates the","desc":""},{"name":"formal Wave Hxx naming + JSDoc kontrakt header pattern (auto-tagged by","desc":""},{"name":"tools/cortex-block-mega-fix.mjs).","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"potSymbolFireball","category":"uncategorised","description":"Wave D-17.5 (Foundry-family gap closure) — Pot-symbol classifier","file":"src/blocks/potSymbolFireball.mjs","testFile":"tests/blocks/potSymbolFireball.test.mjs","loc":566,"exports":["classifyCell","defaultConfig","emitPotSymbolFireballCSS","emitPotSymbolFireballRuntime","resolveConfig","sumLandings"],"emittedEvents":["onPotSymbolCollected","onPotSymbolLanded"],"lifecycleHooks":["onFsSpinResult","onHoldAndWinEnd","onHoldAndWinTrigger","onSpinResult"],"purpose":"Provides a vendor-neutral, math-blind, opt-in classifier that\n  (a) tags pot symbols on the grid with a uniform \"pot\" data flag so\n  downstream holdAndWin / holdAndWinFrameMultiplier / etc. blocks\n  recognize them as value-carrying cells, (b) emits canonical\n  landed/collected events when a pot symbol enters the hold-and-win\n  state, and (c) tracks the running collected pot total within a\n  single feature session so a final sum is published at COLLECT.\n\nIndustry reference (vendor-neutral, industry baseline):\n  Tiered pot symbols (named like MINI / MINOR / MAJOR / GRAND) that\n  land as special variants of the base money-collect symbol and\n  contribute fixed credit awards on top of the standard cell values\n  are an industry baseline for hold-and-win-family titles. The\n  Foundry production GDD §10.2 codifies the rule:\n  \"A held special Fireball carrying MINI (100), MINOR (500), or\n  MAJOR (2000) adds that pot to the running collect total alongside\n  standard Fireball values (pool: 20–1500 credits) and Big Fireball\n  values. Pots persist through respins identically to value Fireballs;\n  they reset the respin counter on the spin they land.\"\n  This block is the structural generalization, not a clone of any\n  particular title.\n\nPersistence + reset semantics\n  The block does NOT implement the respin-reset itself — that lives\n  in `holdAndWin.mjs`. It only emits `onPotSymbolLanded` carrying the\n  tier and credit value; the holdAndWin block already resets the\n  respin counter on any NEW value-carrying landing and persists\n  tagged cells through subsequent respins. The pot tag is what makes\n  the upstream block recognize these cells as \"value Fireballs\" in\n  the first place.\n\nGRAND interaction (out of scope)\n  GRAND (full-board fill) is owned by `grandInterruptionLock.mjs`\n  (D-17.6) which subscribes to holdAndWin board-fill events. This\n  block does NOT trigger GRAND directly; it only contributes credits\n  to the running collect tally, which the upstream block caps at\n  1,000,000 credits per the Foundry §04.6 / §10.6 rule.","industryRef":"","publicApi":[{"name":"export function defaultConfig(): PotSymbolFireballConfig","desc":""},{"name":"export function resolveConfig(model?: object): PotSymbolFireballConfig","desc":""},{"name":"export function emitPotSymbolFireballCSS(cfg): string","desc":""},{"name":"export function emitPotSymbolFireballRuntime(cfg): string","desc":""},{"name":"export function classifyCell(cell, cfg): { tier, credits }|null  (test)","desc":""},{"name":"export function sumLandings(landings): number                    (test)","desc":""},{"name":"Lifecycle (when enabled)","desc":""},{"name":"• onHoldAndWinTrigger","desc":"reset collected-pots state for new session"},{"name":"• onSpinResult / onFsSpinResult","desc":"scan grid → classify pot symbols"},{"name":"","desc":"emit landed per pot"},{"name":"• onHoldAndWinEnd","desc":"emit collected (sum) → reset state"},{"name":"HookBus events (sole emitter contract)","desc":""},{"name":"• onPotSymbolLanded     payload: { tier, credits, reel, row, source }","desc":""},{"name":"• onPotSymbolCollected  payload: { totalPotCredits, breakdown, count }","desc":""},{"name":"Force chip (per rule_force_buttons_real_spin)","desc":""},{"name":"• window.potSymbolFireballForce(tier, reel, row)","desc":""},{"name":"","desc":"sets window.__FORCE_POT_SYMBOL__ = { tier, reel, row }"},{"name":"","desc":"triggers runOneBaseSpin() (real engine path)"},{"name":"","desc":"engine bakes pot landing into spinResult; block detects + emits"}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"prizeBoostBet","category":"uncategorised","description":"Wave LEGO-SIDEBET (B-7 · 2/2) — Prize boost side bet.","file":"src/blocks/prizeBoostBet.mjs","testFile":"tests/blocks/prizeBoostBet.test.mjs","loc":241,"exports":["defaultConfig","emitPrizeBoostBetCSS","emitPrizeBoostBetMarkup","emitPrizeBoostBetRuntime","resolveConfig"],"emittedEvents":["onPrizeBoostChanged"],"lifecycleHooks":["onFsEnd","onFsTrigger"],"purpose":"Pre-spin toggle that lets the player add a cost premium (default\n  +50% bet) in exchange for a multiplier on the next win (default\n  ×2 on the line/cluster pay). Visual + state surface only — math\n  layer reads `window.PRIZE_BOOST_ON` + `window.PRIZE_BOOST_MULT`\n  for PAR Phase 2 RTP rebalance.\n\nIndustry-reference (vendor-neutral):\n  Prize-boost side bets are an emerging 2024-2026 pattern. Player\n  pays a premium for an explicit win multiplier on the next spin.\n  Industry baseline: +25-75% bet for ×1.5-3.0 multiplier. Sister\n  pattern to insurance — opposite risk profile (insurance protects\n  downside, prize boost amplifies upside). Same jurisdiction matrix.","industryRef":"Prize-boost side bets are an emerging 2024-2026 pattern. Player\n  pays a premium for an explicit win multiplier on the next spin.\n  Industry baseline: +25-75% bet for ×1.5-3.0 multiplier. Sister\n  pattern to insurance — opposite risk profile (insurance protects\n  downside, prize boost amplifies upside). Same jurisdiction matrix.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitPrizeBoostBetCSS(cfg)","desc":"CSS string"},{"name":"emitPrizeBoostBetMarkup(cfg)","desc":"HTML string"},{"name":"emitPrizeBoostBetRuntime(cfg)","desc":"runtime JS string"},{"name":"PRIZE_BOOST_BANNED_JURISDICTIONS","desc":"re-exported hard-ban list"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onFsTrigger — lock toggle","desc":""},{"name":"onFsEnd     — unlock","desc":""},{"name":"emits:       onPrizeBoostChanged { on, costMult, winMult }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• role=\"switch\" with aria-checked + visible focus ring","desc":""},{"name":"• Keyboard: Enter/Space toggle","desc":""},{"name":"• prefers-reduced-motion honored","desc":""},{"name":"• Tokens hoisted","desc":""},{"name":"• Hard-disabled under UKGC/SE/DE/NL (parity with bonusBuy)","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["onFsTrigger — lock toggle","onFsEnd     — unlock"],"emits":["onPrizeBoostChanged { on, costMult, winMult }","a11y / perf:","• role=\"switch\" with aria-checked + visible focus ring","• Keyboard: Enter/Space toggle","• prefers-reduced-motion honored","• Tokens hoisted","• Hard-disabled under UKGC/SE/DE/NL (parity with bonusBuy)","/"]}},{"name":"progressiveFreeSpins","category":"multiplier","description":"Multiplier that **escalates on every FS spin regardless of win**, in","file":"src/blocks/progressiveFreeSpins.mjs","testFile":"tests/blocks/progressiveFreeSpins.test.mjs","loc":285,"exports":["defaultConfig","emitProgressiveFreeSpinsCSS","emitProgressiveFreeSpinsMarkup","emitProgressiveFreeSpinsRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onFsEnd","onFsSpinResult","onFsTrigger"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"progressiveFsRetriggerLadder","category":"uncategorised","description":"Wave LEGO-M — Progressive FS Retrigger Ladder.","file":"src/blocks/progressiveFsRetriggerLadder.mjs","testFile":"tests/blocks/progressiveFsRetriggerLadder.test.mjs","loc":432,"exports":["defaultConfig","emitProgressiveFsRetriggerLadderCSS","emitProgressiveFsRetriggerLadderMarkup","emitProgressiveFsRetriggerLadderRuntime","promoteRung","resolveConfig"],"emittedEvents":["onLadderReset","onLadderRungPromoted"],"lifecycleHooks":["onFsEnd","onFsRetrigger","onFsSpinResult","onFsTrigger","preSpin"],"purpose":"───────\n  During a Free Spins round, every retrigger JUMPS the player to the\n  NEXT pre-defined rung on a multiplier ladder. The full ladder is\n  rendered as a vertical (or horizontal) HUD with active rung\n  highlighted. Each rung carries its own multX value applied to every\n  FS spin win until the next retrigger promotion. Distinct from:\n    • `retriggerMultiplierBump.mjs` (single-step or contiguous-ladder\n      bump, no full visible ladder; this block is the LADDER-FIRST\n      variant with rich UI + rung promote celebration)\n    • `multiplierLadder.mjs`        (base-game progressive ladder)\n    • `perFsSpinMultiplier.mjs`     (per-spin random, no retrigger gate)\n    • `persistentMultiplier.mjs`    (accumulator without retrigger gate)\n\n  Semantically: retrigger = climb one rung; cap at top rung;\n  ladder rungs are HUD-visible at all times during FS round.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Stepped FS multiplier ladder\" — visible rung column with active\n  step highlighted. Each new scatter persistence event (retrigger)\n  promotes the player one fixed step on the ladder. Common in\n  modern FS bonus rounds where the ladder is part of the visible UX\n  contract (player sees ahead, anticipates promotions).\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitProgressiveFsRetriggerLadderCSS(cfg)\n  emitProgressiveFsRetriggerLadderMarkup(cfg)\n  emitProgressiveFsRetriggerLadderRuntime(cfg)\n  promoteRung(currentRung, ladderLength)        (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsTrigger     (priority 28) — init PFRL_STATE; HUD render; setMult(ladder[0].multX)\n    • onFsRetrigger   (priority 28) — promote rung; setMult; emit onLadderRungPromoted\n    • onFsSpinResult  (priority 28) — defensive re-sync setMult(currentRung.multX)\n    • onFsEnd         (priority 28) — clear state; setMult(1); emit onLadderReset\n    • preSpin         (priority 28) — HW guard tap (no-op if HW active)\n  emits:\n    • onLadderRungPromoted   { oldRung, newRung, multX }\n    • onLadderReset          { }","industryRef":"───────────────────────────────────\n  \"Stepped FS multiplier ladder\" — visible rung column with active\n  step highlighted. Each new scatter persistence event (retrigger)\n  promotes the player one fixed step on the ladder. Common in\n  modern FS bonus rounds where the ladder is part of the visible UX\n  contract (player sees ahead, anticipates promotions).\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitProgressiveFsRetriggerLadderCSS(cfg)\n  emitProgressiveFsRetriggerLadderMarkup(cfg)\n  emitProgressiveFsRetriggerLadderRuntime(cfg)\n  promoteRung(currentRung, ladderLength)        (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsTrigger     (priority 28) — init PFRL_STATE; HUD render; setMult(ladder[0].multX)\n    • onFsRetrigger   (priority 28) — promote rung; setMult; emit onLadderRungPromoted\n    • onFsSpinResult  (priority 28) — defensive re-sync setMult(currentRung.multX)\n    • onFsEnd         (priority 28) — clear state; setMult(1); emit onLadderReset\n    • preSpin         (priority 28) — HW guard tap (no-op if HW active)\n  emits:\n    • onLadderRungPromoted   { oldRung, newRung, multX }\n    • onLadderReset          { }","publicApi":[],"lifecycle":{"subscribes":["• onFsTrigger     (priority 28) — init PFRL_STATE; HUD render; setMult(ladder[0].multX)","• onFsRetrigger   (priority 28) — promote rung; setMult; emit onLadderRungPromoted","• onFsSpinResult  (priority 28) — defensive re-sync setMult(currentRung.multX)","• onFsEnd         (priority 28) — clear state; setMult(1); emit onLadderReset","• preSpin         (priority 28) — HW guard tap (no-op if HW active)"],"emits":["• onLadderRungPromoted   { oldRung, newRung, multX }","• onLadderReset          { }"]}},{"name":"pwaInstallability","category":"uncategorised","description":"players can add to home-screen, run full-screen without browser","file":"src/blocks/pwaInstallability.mjs","testFile":"tests/blocks/pwaInstallability.test.mjs","loc":315,"exports":["defaultConfig","emitPwaInstallabilityMarkup","emitPwaInstallabilityRuntime","resolveConfig"],"emittedEvents":["onPwaInstallable","onPwaInstalled","onPwaSwReady"],"lifecycleHooks":[],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitPwaInstallabilityMarkup(cfg)","desc":"markup string (head <link>)"},{"name":"emitPwaInstallabilityRuntime(cfg)","desc":"runtime JS string"}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"pyramidGridEngine","category":"uncategorised","description":"Wave LEGO-ENG.1 — Pyramid grid topology engine.","file":"src/blocks/pyramidGridEngine.mjs","testFile":"tests/blocks/pyramidGridEngine.test.mjs","loc":354,"exports":["buildPyramidShape","defaultConfig","emitPyramidGridEngineCSS","emitPyramidGridEngineMarkup","emitPyramidGridEngineRuntime","resolveConfig"],"emittedEvents":["onPyramidSpinResult"],"lifecycleHooks":["preSpin"],"purpose":"───────\n  Renders + animates a PYRAMID grid where each subsequent reel has\n  ONE MORE row than its predecessor (default 1-2-3-4-5). Symbols\n  \"fall\" from the top of each column with stagger; landed grid\n  contains exactly `(N*(N+1))/2` cells for an N-reel pyramid.\n\n  Distinct from existing layout engines:\n    • `reelEngine.mjs`          — rectangular N×M reels\n    • `hexReelEngine.mjs`       — hex axial (q,r) topology\n    • `dynamicWaysEngine.mjs`   — variable rows per reel\n    • `infinityReelsEngine.mjs` — grid grows per win\n\n  Pyramid is FIXED-SHAPE per spin; rows ramp 1→N. Common for\n  themed slots (Aztec / Egyptian / fantasy) and for evaluator\n  experimentation where rows-per-reel monotonic ramp opens unique\n  payline configurations.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Pyramid reels\" topology — N reels, monotonically rising row\n  counts. Anchored bottom; cells align via centered column layout.","industryRef":"───────────────────────────────────\n  \"Pyramid reels\" topology — N reels, monotonically rising row\n  counts. Anchored bottom; cells align via centered column layout.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitPyramidGridEngineCSS(cfg)","desc":""},{"name":"emitPyramidGridEngineMarkup(cfg)","desc":""},{"name":"emitPyramidGridEngineRuntime(cfg, model)","desc":""},{"name":"buildPyramidShape(reelCount, startRows)        (pure helper)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• preSpin       (priority 28) — flush pending settle, cancel timers","desc":""},{"name":"emits:","desc":""},{"name":"• onPyramidSpinResult   { duringFs, topology: 'pyramid', cells }","desc":""},{"name":"exposes:","desc":""},{"name":"• window.__SLOT_KIND_RUNSPIN__.pyramid(onSettled) — dispatcher","desc":""},{"name":"entry point per kind-dispatch contract","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"randomLightningMultiplier","category":"multiplier","description":"Wave LEGO-M2 — Random spin-wide \"lightning\" multiplier (base game).","file":"src/blocks/randomLightningMultiplier.mjs","testFile":"tests/blocks/randomLightningMultiplier.test.mjs","loc":454,"exports":["defaultConfig","emitRandomLightningMultiplierCSS","emitRandomLightningMultiplierMarkup","emitRandomLightningMultiplierRuntime","pickLightningMultiplier","resolveConfig","shouldStrike"],"emittedEvents":["onLightningStrike","onLightningStrikeMissed"],"lifecycleHooks":["onFsEnd","onFsTrigger","onSpinResult","preSpin"],"purpose":"───────\n  For BASE GAME spins only: after the win evaluation produces a\n  non-zero base payout, a probabilistic \"lightning strike\" may fire,\n  selecting a ×N value from a weighted distribution and multiplying\n  the current spin's total win by N. A bolt VFX overlay paints across\n  the grid host. Distinct from:\n    • multiplierLadder       (FS progressive — grows monotonically)\n    • persistentMultiplier   (FS accumulator — never resets)\n    • multiplierOrb          (per-cell symbol-bound multiplier)\n    • perFsSpinMultiplier    (per-FS-spin random — FS only)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Random per-spin multiplier strike\" base-game pattern — after a\n  winning base spin, a chance roll triggers a screen-wide bolt\n  overlay and multiplies the win amount by a weighted ×N draw.\n  Disabled in Free Spins (FS owns its own multiplier system) and\n  Hold & Win (round logic does not stack with strike multipliers).\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitRandomLightningMultiplierCSS(cfg)\n  emitRandomLightningMultiplierMarkup(cfg)\n  emitRandomLightningMultiplierRuntime(cfg)\n  pickLightningMultiplier(distribution, rng)   (pure helper, exported for tests)\n  shouldStrike(probability, rng)               (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • preSpin        (priority 40) — clears any lingering bolt overlay\n    • onSpinResult   (priority 40) — runs strike roll on winning base spin\n    • onFsTrigger    (priority 40) — guards FS entry (no strikes in FS)\n    • onFsEnd        (priority 40) — clears state when FS ends\n  emits:\n    • onLightningStrike       { multX, prevMult, newMult }\n    • onLightningStrikeMissed { }","industryRef":"───────────────────────────────────\n  \"Random per-spin multiplier strike\" base-game pattern — after a\n  winning base spin, a chance roll triggers a screen-wide bolt\n  overlay and multiplies the win amount by a weighted ×N draw.\n  Disabled in Free Spins (FS owns its own multiplier system) and\n  Hold & Win (round logic does not stack with strike multipliers).\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitRandomLightningMultiplierCSS(cfg)\n  emitRandomLightningMultiplierMarkup(cfg)\n  emitRandomLightningMultiplierRuntime(cfg)\n  pickLightningMultiplier(distribution, rng)   (pure helper, exported for tests)\n  shouldStrike(probability, rng)               (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • preSpin        (priority 40) — clears any lingering bolt overlay\n    • onSpinResult   (priority 40) — runs strike roll on winning base spin\n    • onFsTrigger    (priority 40) — guards FS entry (no strikes in FS)\n    • onFsEnd        (priority 40) — clears state when FS ends\n  emits:\n    • onLightningStrike       { multX, prevMult, newMult }\n    • onLightningStrikeMissed { }","publicApi":[],"lifecycle":{"subscribes":["• preSpin        (priority 40) — clears any lingering bolt overlay","• onSpinResult   (priority 40) — runs strike roll on winning base spin","• onFsTrigger    (priority 40) — guards FS entry (no strikes in FS)","• onFsEnd        (priority 40) — clears state when FS ends"],"emits":["• onLightningStrike       { multX, prevMult, newMult }","• onLightningStrikeMissed { }"]}},{"name":"randomWildBurst","category":"wild","description":"Wave LEGO-RANDOM (B-3) — Random Wild Burst.","file":"src/blocks/randomWildBurst.mjs","testFile":"tests/blocks/randomWildBurst.test.mjs","loc":272,"exports":["defaultConfig","emitRandomWildBurstCSS","emitRandomWildBurstMarkup","emitRandomWildBurstRuntime","resolveConfig"],"emittedEvents":["onRandomWildBurstFired"],"lifecycleHooks":["onFsEnd","onFsTrigger","onSpinResult"],"purpose":"When GDD declares `random_wild_burst`, this block randomly \"bursts\"\n  N cells into wilds during a spin's settle phase — typically 2-8\n  cells at random positions on the grid, with a brief flash + halo\n  visual cue. This is a sister-pattern to expandingWild + mysterySymbol\n  but operates as a STOCHASTIC per-spin event (not a symbol-driven\n  reveal). The burst happens on the orchestrator's onSpinResult, BEFORE\n  evaluator runs — so the planted wilds boost win frequency.\n\nIndustry-reference (vendor-neutral):\n  Random-wild events are an industry-standard delight pattern in\n  non-tumble slots — historically called \"Random Wilds Feature\" /\n  \"Lightning Wilds\" / \"Wild Explosion\". 2024-2026 implementations\n  trend toward 3-6 cells burst at ~1-in-15 spin rate. The block models\n  the visual + planting surface; the math layer reads the planted\n  wild count via window.__RANDOM_WILD_BURST__ to weight the RTP.","industryRef":"Random-wild events are an industry-standard delight pattern in\n  non-tumble slots — historically called \"Random Wilds Feature\" /\n  \"Lightning Wilds\" / \"Wild Explosion\". 2024-2026 implementations\n  trend toward 3-6 cells burst at ~1-in-15 spin rate. The block models\n  the visual + planting surface; the math layer reads the planted\n  wild count via window.__RANDOM_WILD_BURST__ to weight the RTP.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitRandomWildBurstCSS(cfg)","desc":"CSS string (flash + halo overlay)"},{"name":"emitRandomWildBurstMarkup(cfg)","desc":"HTML string (overlay host)"},{"name":"emitRandomWildBurstRuntime(cfg)","desc":"runtime JS string for orchestrator"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onSpinResult — RNG dice + cell planting","desc":""},{"name":"onFsTrigger  — suspend mid-bonus (FS has own random pool)","desc":""},{"name":"onFsEnd      — resume after bonus","desc":""},{"name":"emits:       onRandomWildBurstFired { cells, count }","desc":""},{"name":"a11y / perf: talMultiplierChip.mjs","testFile":"tests/blocks/totalMultiplierChip.test.mjs","loc":209,"exports":["defaultConfig","emitTotalMultiplierChipCSS","emitTotalMultiplierChipMarkup","emitTotalMultiplierChipRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onFsEnd","onMultiplierChanged","preSpin"],"purpose":"───────\n  Universal HUD widget showing the CURRENT global multiplier — the\n  product of every mult source active right now (orb sum, persistent,\n  FS retrigger bump, wild collision product, cluster size tier, etc.).\n  Listens to `HookBus.setMult` calls and renders the live value in a\n  chip that pulses on each change.\n\n  Distinct from per-feature chips:\n    • multiplierOrb chip = per-cell orb value\n    • winMultiplierBadge = per-line or per-cluster badge\n    • retriggerMultiplierBump chip = round-mult during FS retrigger\n\n  `totalMultiplierChip` is the SINGLE source of truth display for\n  \"what mult applies to the next payout settle\". Players always know.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Global mult chip is a UX pattern found across multiplier-rich slots.\n  Sits above or below the reels, badges every change, decays to a\n  passive state between events.","industryRef":"───────────────────────────────────\n  Global mult chip is a UX pattern found across multiplier-rich slots.\n  Sits above or below the reels, badges every change, decays to a\n  passive state between events.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitTotalMultiplierChipCSS(cfg)","desc":""},{"name":"emitTotalMultiplierChipMarkup(cfg)","desc":""},{"name":"emitTotalMultiplierChipRuntime(cfg, model)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onMultiplierChanged   (priority 50) — bus signal that lastMult moved","desc":""},{"name":"• preSpin               (priority 50) — reset to 1× chip visual","desc":""},{"name":"• onFsEnd               (priority 50) — reset to 1× chip visual","desc":""},{"name":"emits: (none — pure display)","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"triggerCounting","category":"fs","description":"Slot GDD Factory · triggerCounting BLOCK","file":"src/blocks/triggerCounting.mjs","testFile":"tests/blocks/triggerCounting.test.mjs","loc":150,"exports":["defaultConfig","emitTriggerCountingRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onSpinResult","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitTriggerCountingRuntime(cfg)","desc":"runtime JS string"},{"name":"Wave Legacy · industry baseline (vendor-neutral). Original block predates the","desc":""},{"name":"formal Wave Hxx naming + JSDoc kontrakt header pattern (auto-tagged by","desc":""},{"name":"tools/cortex-block-mega-fix.mjs).","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"tumble","category":"engine","description":"When GDD declares `topology.cascade.enabled: true` (cluster-cascade /","file":"src/blocks/tumble.mjs","testFile":"tests/blocks/tumble.test.mjs","loc":419,"exports":["defaultConfig","emitTumbleCSS","emitTumbleRuntime","resolveConfig"],"emittedEvents":["onTumbleStep"],"lifecycleHooks":["onFsEnd","preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"tumbleGrowingFsMultiplier","category":"engine","description":"Wave LEGO-M2 — Tumble-growing FS multiplier.","file":"src/blocks/tumbleGrowingFsMultiplier.mjs","testFile":"tests/blocks/tumbleGrowingFsMultiplier.test.mjs","loc":300,"exports":["computeNextMult","defaultConfig","emitTumbleGrowingFsMultiplierCSS","emitTumbleGrowingFsMultiplierMarkup","emitTumbleGrowingFsMultiplierRuntime","resolveConfig"],"emittedEvents":["onTumbleMultiplierGrown","onTumbleMultiplierReset"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onTumbleStep","preSpin"],"purpose":"───────\n  For Free Spins rounds where the multiplier GROWS with each tumble /\n  cascade step inside a SINGLE FS spin. On every new FS spin the\n  counter resets to `startMult` and bumps by `growPerTumble` per\n  tumble step (capped at `maxMult`). Distinct from:\n    • perFsSpinMultiplier   (independent random draw per FS spin)\n    • persistentMultiplier  (accumulates across spins, never resets)\n    • multiplierLadder      (progressive ladder, not tumble-driven)\n    • multiplierOrb         (per-cell symbol-bound multiplier)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Classic \"cascade-bump multiplier in FS\" pattern — chip displays the\n  current value over the reels, ticks +N for each cascade resolution\n  inside the same FS spin, resets at the next FS spin.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitTumbleGrowingFsMultiplierCSS(cfg)\n  emitTumbleGrowingFsMultiplierMarkup(cfg)\n  emitTumbleGrowingFsMultiplierRuntime(cfg)\n  computeNextMult(current, growPerTumble, maxMult)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsSpinResult (priority 30) — reset chip to startMult, set HookBus.setMult\n    • onTumbleStep   (priority 30) — bump current += growPerTumble (capped), set HookBus.setMult\n    • onFsEnd        (priority 30) — clear chip + state\n    • preSpin        (priority 30) — clear if NOT in FS (safety)\n  emits:\n    • onTumbleMultiplierGrown  { step, value }\n    • onTumbleMultiplierReset  { value }","industryRef":"───────────────────────────────────\n  Classic \"cascade-bump multiplier in FS\" pattern — chip displays the\n  current value over the reels, ticks +N for each cascade resolution\n  inside the same FS spin, resets at the next FS spin.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitTumbleGrowingFsMultiplierCSS(cfg)\n  emitTumbleGrowingFsMultiplierMarkup(cfg)\n  emitTumbleGrowingFsMultiplierRuntime(cfg)\n  computeNextMult(current, growPerTumble, maxMult)   (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsSpinResult (priority 30) — reset chip to startMult, set HookBus.setMult\n    • onTumbleStep   (priority 30) — bump current += growPerTumble (capped), set HookBus.setMult\n    • onFsEnd        (priority 30) — clear chip + state\n    • preSpin        (priority 30) — clear if NOT in FS (safety)\n  emits:\n    • onTumbleMultiplierGrown  { step, value }\n    • onTumbleMultiplierReset  { value }","publicApi":[],"lifecycle":{"subscribes":["• onFsSpinResult (priority 30) — reset chip to startMult, set HookBus.setMult","• onTumbleStep   (priority 30) — bump current += growPerTumble (capped), set HookBus.setMult","• onFsEnd        (priority 30) — clear chip + state","• preSpin        (priority 30) — clear if NOT in FS (safety)"],"emits":["• onTumbleMultiplierGrown  { step, value }","• onTumbleMultiplierReset  { value }"]}},{"name":"tumbleOnlyFs","category":"engine","description":"Wave LEGO-FSV.3 — Tumble-only Free Spins (no fresh re-spin).","file":"src/blocks/tumbleOnlyFs.mjs","testFile":"tests/blocks/tumbleOnlyFs.test.mjs","loc":260,"exports":["defaultConfig","emitTumbleOnlyFsCSS","emitTumbleOnlyFsRuntime","resolveConfig"],"emittedEvents":["onTumbleOnlyFsChainEnded","onTumbleOnlyFsModeEntered"],"lifecycleHooks":["onFsEnd","onFsTrigger","onTumbleStep"],"purpose":"───────\n  FS variant where each \"spin\" is actually a tumble chain — no fresh\n  reel spin, just cascade reductions until the board empties or the\n  tumble chain dies. Each tumble step counts as one \"FS spin\"; the\n  round ends when the configured number of tumble chains have run\n  their course (or the reels run out of pre-seeded symbols).\n\n  This is fundamentally different from `tumble.mjs`:\n    • `tumble.mjs` — cascade AFTER a win, base spin still runs first\n    • `tumbleOnlyFs` — NO base spin during FS; only tumbles consume\n\n  Industry pattern: Crystal-Forge-style \"drop everything once, then\n  tumble until empty\" FS mode that gives a single continuous chain\n  for the entire FS round.\n\n  Distinct from `infinityReelsEngine`:\n    • infinityReels grows grid per win\n    • tumbleOnlyFs runs cascade-only spins on a static grid\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  \"Tumble only\" / \"single drop\" FS mode found on cascade slots. One\n  board fill at FS_INTRO, then tumble until no wins, then count down.","industryRef":"───────────────────────────────────\n  \"Tumble only\" / \"single drop\" FS mode found on cascade slots. One\n  board fill at FS_INTRO, then tumble until no wins, then count down.","publicApi":[{"name":"──────────","desc":""},{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitTumbleOnlyFsCSS(cfg)","desc":""},{"name":"emitTumbleOnlyFsRuntime(cfg, model)","desc":""},{"name":"Lifecycle (HookBus)","desc":""},{"name":"───────────────────","desc":""},{"name":"subscribes:","desc":""},{"name":"• onFsTrigger      (priority 32) — enter tumble-only mode","desc":""},{"name":"• onTumbleStep     (priority 32) — decrement chain counter","desc":""},{"name":"• onFsEnd          (priority 32) — exit mode","desc":""},{"name":"emits:","desc":""},{"name":"• onTumbleOnlyFsModeEntered   { chainsBudget }","desc":""},{"name":"• onTumbleOnlyFsChainEnded    { chainsRemaining }","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"turboMode","category":"round-control","description":"spin toggle): a hub button flips a global flag that compresses the","file":"src/blocks/turboMode.mjs","testFile":"tests/blocks/turboMode.test.mjs","loc":377,"exports":["defaultConfig","emitTurboModeCSS","emitTurboModeMarkup","emitTurboModeRuntime","resolveConfig"],"emittedEvents":["onTurboToggle"],"lifecycleHooks":["preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitTurboModeCSS(cfg)","desc":""},{"name":"emitTurboModeMarkup(cfg)","desc":""},{"name":"emitTurboModeRuntime(cfg)","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"uiToast","category":"ui","description":"Centralised \"celebration\" overlay for win tiers and feature triggers.","file":"src/blocks/uiToast.mjs","testFile":"tests/blocks/uiToast.test.mjs","loc":410,"exports":["TOAST_TIERS","defaultConfig","emitUiToastCSS","emitUiToastMarkup","emitUiToastRuntime","resolveConfig"],"emittedEvents":[],"lifecycleHooks":["onFsEnd","onFsTrigger","postSpin","preSpin"],"purpose":"","industryRef":"","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"ukgcComplianceGate","category":"uncategorised","description":"W60.J-UK (Wave F7 / HX1) — UK Gambling Commission (UKGC) RTS compliance gate.","file":"src/blocks/ukgcComplianceGate.mjs","testFile":"tests/blocks/ukgcComplianceGate.test.mjs","loc":163,"exports":["UK_AUTOPLAY_BOUNDS","UK_AUTOPLAY_MAX_CAP","UK_MIN_SPIN_MS_BOUNDS","UK_MIN_SPIN_MS_DEFAULT","UK_REALITY_CHECK_BOUNDS","UK_REALITY_CHECK_DEFAULT","defaultConfig","emitUkgcComplianceGateCSS","emitUkgcComplianceGateRuntime","resolveConfig"],"emittedEvents":["onGamStopCheckRequired","onUkAutoplayCapEnforced","onUkNetPositionRequired","onUkRealityCheckEnforced","onUkRtpDisclosureRequired","onUkRtsSpinPaceEnforced"],"lifecycleHooks":[],"purpose":"","industryRef":"","publicApi":[{"name":"export const UK_MIN_SPIN_MS_DEFAULT","desc":""},{"name":"export const UK_AUTOPLAY_MAX_CAP","desc":""},{"name":"export const UK_REALITY_CHECK_MAX_MS","desc":""},{"name":"export function defaultConfig(): UkgcComplianceGateConfig","desc":""},{"name":"export function resolveConfig(model?: object): UkgcComplianceGateConfig","desc":""},{"name":"export function emitUkgcComplianceGateCSS(cfg): string  (no-op)","desc":""},{"name":"export function emitUkgcComplianceGateRuntime(cfg): string","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"universalForcePanel","category":"uncategorised","description":"Wave U-FORCE-ALL.1 — Universal feature force panel (PRESENTATION MODE).","file":"src/blocks/universalForcePanel.mjs","testFile":"tests/blocks/universalForcePanel.test.mjs","loc":1222,"exports":["KIND_FULL","KIND_SHORT","KNOWN_KINDS","defaultConfig","emitUniversalForcePanelCSS","emitUniversalForcePanelMarkup","emitUniversalForcePanelRuntime","resolveConfig","selectKinds"],"emittedEvents":["onForceCollectorFill","onForceFeatureRequested","onForceMultiplier","onForceTournamentRank"],"lifecycleHooks":[],"purpose":"───────\n  When a regulator, sales-team member, or partner uploads ANY GDD into\n  the slot simulator, the resulting playable HTML must expose a force\n  button for EVERY feature the parser detected — Free Spins, Bonus Buy,\n  Hold & Win, Bonus Pick, Wheel Bonus, Multiplier Orb, Lightning,\n  Sticky Wild, Expanding Wild, Walking Wild, Mystery Symbol, Cascade,\n  Cluster Pays, Respin, Wild Reel, Gamble, Ante Bet, Super Symbol, etc.\n\n  Each force CTA MUST drive a real spin via `runOneBaseSpin()` (see\n  `rule_force_buttons_real_spin.md`) — never a shortcut into FSM. The\n  spin then carries a `__FORCE_FEATURE__` flag that downstream lifecycle\n  hooks consume to deterministically land the requested feature.\n\n  Buttons that the existing feature-specific block already owns\n  (e.g. `bonusBuy.mjs` exposes its own BUY chip, `freeSpins` has dev FS\n  trigger via `__SLOT_DEV_FORCE_FS__`) are de-duplicated by name so we\n  never paint two CTAs for the same feature.\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Every certified slot platform ships a QA panel that exposes per-\n  feature force triggers. The chip rail sits in the dev-tools region\n  (top-right by default) and is gated by `model.universalForcePanel.\n  enabled` (true by default in dev/preview builds, false in prod).\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitUniversalForcePanelCSS(cfg)\n  emitUniversalForcePanelMarkup(cfg, model)\n  emitUniversalForcePanelRuntime(cfg, model)\n\nLifecycle (HookBus contract — emit-only)\n────────────────────────────────────────\n  The block emits ONE canonical event when a force chip is clicked:\n    onForceFeatureRequested({ kind, label, source: 'panel' })\n  Then it sets `window.__FORCE_FEATURE__ = kind` and triggers a real\n  `runOneBaseSpin()`. Feature-specific blocks (freeSpins, bonusBuy,\n  multiplierOrb, etc.) subscribe to `onForceFeatureRequested` OR read\n  `window.__FORCE_FEATURE__` at the start of their `preSpin` hook\n  and act accordingly. `genericFeatureBanner.mjs` is the catch-all\n  subscriber for kinds with no dedicated handler.","industryRef":"───────────────────────────────────\n  Every certified slot platform ships a QA panel that exposes per-\n  feature force triggers. The chip rail sits in the dev-tools region\n  (top-right by default) and is gated by `model.universalForcePanel.\n  enabled` (true by default in dev/preview builds, false in prod).\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitUniversalForcePanelCSS(cfg)\n  emitUniversalForcePanelMarkup(cfg, model)\n  emitUniversalForcePanelRuntime(cfg, model)\n\nLifecycle (HookBus contract — emit-only)\n────────────────────────────────────────\n  The block emits ONE canonical event when a force chip is clicked:\n    onForceFeatureRequested({ kind, label, source: 'panel' })\n  Then it sets `window.__FORCE_FEATURE__ = kind` and triggers a real\n  `runOneBaseSpin()`. Feature-specific blocks (freeSpins, bonusBuy,\n  multiplierOrb, etc.) subscribe to `onForceFeatureRequested` OR read\n  `window.__FORCE_FEATURE__` at the start of their `preSpin` hook\n  and act accordingly. `genericFeatureBanner.mjs` is the catch-all\n  subscriber for kinds with no dedicated handler.","publicApi":[],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"volatilitySelector","category":"uncategorised","description":"Wave LEGO-VOLATILITY (B-6) — Pre-spin player volatility chooser.","file":"src/blocks/volatilitySelector.mjs","testFile":"tests/blocks/volatilitySelector.test.mjs","loc":337,"exports":["defaultConfig","emitVolatilitySelectorCSS","emitVolatilitySelectorMarkup","emitVolatilitySelectorRuntime","resolveConfig"],"emittedEvents":["onVolatilityChanged"],"lifecycleHooks":["onFsEnd","onFsTrigger"],"purpose":"When GDD declares `volatility_selector`, this block paints a 3-5\n  tier choice surface (Low / Medium / High / Ultra default) that\n  the player can select BEFORE each spin. The selection writes to\n  `window.VOLATILITY_TIER` so the math layer can pull the matching\n  PAR strip — same RTP across tiers (~96.5%), different hit-rate +\n  max-win curve. Industry-standard player-choice surface.\n\n  This block is UI + state only. Real PAR strip swap lands with the\n  PAR hot-swap injector (Phase 2). Until then the selection is a\n  \"visual feel\" knob — tier choice does not yet rewrite outcomes.\n\nIndustry-reference (vendor-neutral):\n  Player-choice volatility selectors emerged 2023-2025 as a UX\n  convergence pattern. The chooser sits next to the BET selector\n  in the spin cluster. Typical labels Low/Med/High and per-tier\n  subtitle (\"Frequent small wins\" vs \"Rare big wins\"). Locked\n  during bonus rounds so players can't game the trigger model\n  mid-feature.","industryRef":"Player-choice volatility selectors emerged 2023-2025 as a UX\n  convergence pattern. The chooser sits next to the BET selector\n  in the spin cluster. Typical labels Low/Med/High and per-tier\n  subtitle (\"Frequent small wins\" vs \"Rare big wins\"). Locked\n  during bonus rounds so players can't game the trigger model\n  mid-feature.","publicApi":[{"name":"defaultConfig()","desc":"frozen safe defaults"},{"name":"resolveConfig(model)","desc":"merge defaults with GDD override"},{"name":"emitVolatilitySelectorCSS(cfg)","desc":"CSS string"},{"name":"emitVolatilitySelectorMarkup(cfg)","desc":"HTML string"},{"name":"emitVolatilitySelectorRuntime(cfg)","desc":"runtime JS string"},{"name":"Lifecycle (HookBus contract):","desc":""},{"name":"subscribes:  onFsTrigger — lock chooser during bonus","desc":""},{"name":"onFsEnd     — unlock after bonus","desc":""},{"name":"emits:       onVolatilityChanged { tierId, tierIndex, label }","desc":""},{"name":"a11y / perf:","desc":""},{"name":"• role=\"radiogroup\" with role=\"radio\" buttons; Arrow/Home/End","desc":""},{"name":"keyboard nav; aria-checked toggling.","desc":""},{"name":"• Subtitle \"Frequent wins\" / \"Bigger swings\" announced via","desc":""},{"name":"aria-describedby for screen readers.","desc":""},{"name":"• prefers-reduced-motion honored.","desc":""},{"name":"• Tokens hoisted (0 magic numbers).","desc":""},{"name":"• Locked state visually muted + pointer-events: none.","desc":""},{"name":"/","desc":""}],"lifecycle":{"subscribes":["onFsTrigger — lock chooser during bonus","onFsEnd     — unlock after bonus"],"emits":["onVolatilityChanged { tierId, tierIndex, label }","a11y / perf:","• role=\"radiogroup\" with role=\"radio\" buttons; Arrow/Home/End","keyboard nav; aria-checked toggling.","• Subtitle \"Frequent wins\" / \"Bigger swings\" announced via","aria-describedby for screen readers.","• prefers-reduced-motion honored.","• Tokens hoisted (0 magic numbers).","• Locked state visually muted + pointer-events: none.","/"]}},{"name":"walkingWild","category":"wild","description":"Wild walks one position per spin (typical: leftward) and triggers a","file":"src/blocks/walkingWild.mjs","testFile":"tests/blocks/walkingWild.test.mjs","loc":272,"exports":["defaultConfig","emitWalkingWildCSS","emitWalkingWildRuntime","resolveConfig"],"emittedEvents":["requestRespin"],"lifecycleHooks":["onFsEnd","onFsTrigger","onSpinResult","preSpin"],"purpose":"","industryRef":"","publicApi":[{"name":"defaultConfig() / resolveConfig(model)","desc":""},{"name":"emitWalkingWildCSS(cfg), emitWalkingWildMarkup(cfg),","desc":""},{"name":"emitWalkingWildRuntime(cfg)","desc":""},{"name":"Lifecycle (HookBus):","desc":""},{"name":"subscribes: preSpin (snapshot wild positions), onSpinResult (place","desc":""},{"name":"walked wild + trigger respin if configured), onFsEnd (clear)","desc":""},{"name":"emits (owned): onWalkingWildPlaced, onWalkingWildRespin,","desc":""},{"name":"onWalkingWildOffGrid","desc":""}],"lifecycle":{"subscribes":[],"emits":[]}},{"name":"walkingWildStepper","category":"wild","description":"Wave LEGO-WWS — Walking Wild Stepper with progressive multiplier.","file":"src/blocks/walkingWildStepper.mjs","testFile":"tests/blocks/walkingWildStepper.test.mjs","loc":535,"exports":["defaultConfig","emitWalkingWildStepperCSS","emitWalkingWildStepperMarkup","emitWalkingWildStepperRuntime","nextMult","nextPosition","resolveConfig"],"emittedEvents":["onWalkingWildExited","onWalkingWildSpawned","onWalkingWildStep"],"lifecycleHooks":["onFsEnd","onFsSpinResult","onFsTrigger","onSpinResult","preSpin"],"purpose":"───────\n  Free Spins (or base, configurable) walking-wild variant where a SINGLE\n  wild lands on one reel column and walks `stepCells` columns per spin\n  in a fixed `direction`. Each step bumps a sticky multiplier by\n  `growPerStep` (capped at `maxMult`). When the wild walks OFF the grid\n  the state clears and a fresh spawn roll begins on the next spin.\n  Distinct from:\n    • walkingWild              (per-spin position + optional respin, no progressive mult)\n    • multiplierLadder         (FS progressive — grows monotonically, no walker)\n    • persistentMultiplier     (FS accumulator — never resets, no walker)\n    • perFsSpinMultiplier      (per-FS-spin random — independent per spin)\n\nIndustry reference (vendor-neutral)\n───────────────────────────────────\n  Classic \"walking wild stepper\" pattern — a wild reel stamp marches\n  one column per spin, the on-screen ×N badge above/below the walker\n  ticks up by a fixed step, and the walker eventually exits the grid,\n  clearing the multiplier and re-arming the spawn roll.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitWalkingWildStepperCSS(cfg)\n  emitWalkingWildStepperMarkup(cfg)\n  emitWalkingWildStepperRuntime(cfg)\n  nextPosition(current, direction, stepCells, reelCount)   (pure helper, exported for tests)\n  nextMult(currentMult, growPerStep, maxMult)              (pure helper, exported for tests)\n\nLifecycle (HookBus contract)\n────────────────────────────\n  subscribes:\n    • onFsTrigger    (priority 35) — init WWS_STATE for FS round\n    • onFsSpinResult (priority 35) — spawn / step / exit logic\n    • onFsEnd        (priority 35) — clear state + DOM\n    • preSpin        (priority 35) — no-op (walker persists across FS respins)\n    • onSpinResult   (priority 35) — base-game branch when appliesIn='base'|'both'\n  emits:\n    • onWalkingWildSpawned { reel }\n    • onWalkingWildStep    { fromReel, toReel, multX }\n    • onWalkingWildExited  { stepsTotal, finalMult }","industryRef":"───────────────────────────────────\n  Classic \"walking wild stepper\" pattern — a wild reel stamp marches\n  one column per spin, the on-screen ×N badge above/below the walker\n  ticks up by a fixed step, and the walker eventually exits the grid,\n  clearing the multiplier and re-arming the spawn roll.\n\nPublic API (server-side, ES module)\n──────────────────────────────────\n  defaultConfig()\n  resolveConfig(model)\n  emitWalkingWildStepperCSS(cfg)\n  emitWalkingWildStepperMarkup(cfg)\n  emitWalkingWildStepperRuntime(cfg)\n  nextPosition(current, direction, stepCells, reelCount)   (pure helper, exported for tests)\n  nextMult(currentMult, growPerStep, maxMult)              (pure helper, exported for tests)\n\nLifecycle (HookBus cont const nav = document.getElementById('nav');
const detail = document.getElementById('detail');
const filter = document.getElementById('filter');

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }
function renderNav(filterText) {
  const ft = (filterText || '').toLowerCase().trim();
  const byCat = {};
  for (const b of BLOCKS) {
    const matchName = b.name.toLowerCase().includes(ft);
    const matchCat  = (b.category || '').toLowerCase().includes(ft);
    const matchEvent = (b.emittedEvents || []).some(e => e.toLowerCase().includes(ft)) ||
                       (b.lifecycleHooks || []).some(e => e.toLowerCase().includes(ft));
    if (ft && !matchName && !matchCat && !matchEvent) continue;
    const cat = b.category || 'uncategorised';
    (byCat[cat] = byCat[cat] || []).push(b);
  }
  let html = '';
  for (const cat of Object.keys(byCat).sort()) {
    html += '<div class="cat">' + esc(cat) + ' (' + byCat[cat].length + ')</div>';
    for (const b of byCat[cat].sort((a, b) => a.name.localeCompare(b.name))) {
      html += '<button class="entry" data-name="' + esc(b.name) + '"><span>' + esc(b.name) + '</span><span class="loc">' + b.loc + ' LOC</span></button>';
    }
  }
  nav.innerHTML = html || '<div class="cat" style="padding:20px;">No matches</div>';
  for (const btn of nav.querySelectorAll('button.entry')) {
    btn.addEventListener('click', () => select(btn.getAttribute('data-name')));
  }
}
function select(name) {
  const b = BLOCKS.find(x => x.name === name);
  if (!b) return;
  for (const btn of nav.querySelectorAll('button.entry')) {
    btn.setAttribute('aria-current', btn.getAttribute('data-name') === name ? 'true' : 'false');
  }
  detail.innerHTML =
    '<h2>' + esc(b.name) + '</h2>' +
    '<div class="meta">' +
      '<span class="chip">📁 ' + esc(b.category || '—') + '</span>' +
      '<span class="chip">📄 ' + b.loc + ' LOC</span>' +
      '<span class="chip">🔬 ' + esc(b.testFile || 'no test') + '</span>' +
    '</div>' +
    '<p>' + (b.description ? esc(b.description) : '<span class="empty">no description</span>') + '</p>' +
    (b.purpose ? '<h3>Purpose</h3><p>' + esc(b.purpose).replace(/\n/g, '<br>') + '</p>' : '') +
    (b.industryRef ? '<h3>Industry reference (vendor-neutral)</h3><p>' + esc(b.industryRef).replace(/\n/g, '<br>') + '</p>' : '') +
    '<h3>Public API exports</h3><ul>' +
      (b.exports.length ? b.exports.map(e => '<li><code>' + esc(e) + '</code></li>').join('') : '<li class="empty">—</li>') +
    '</ul>' +
    '<h3>Lifecycle</h3>' +
    '<p><strong>Subscribes:</strong> ' +
      (b.lifecycleHooks.length ? b.lifecycleHooks.map(e => '<code>' + esc(e) + '</code>').join(' · ') : '<span class="empty">none</span>') +
    '</p>' +
    '<p><strong>Emits:</strong> ' +
      (b.emittedEvents.length ? b.emittedEvents.map(e => '<code>' + esc(e) + '</code>').join(' · ') : '<span class="empty">none</span>') +
    '</p>' +
    '<h3>Files</h3><pre>' + esc(b.file) + (b.testFile ? '\n' + esc(b.testFile) : '') + '</pre>';
}
filter.addEventListener('input', () => renderNav(filter.value));
renderNav('');
if (BLOCKS.length > 0) select(BLOCKS[0].name);
</script>
